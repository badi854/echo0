<!-- ============================================================
     模块 15：JavaScript — 完整应用
     ============================================================ -->
<script>
(function(){
  "use strict";

  // ==========================================================
  // 子模块 15.1：存储层
  // ==========================================================
  var Storage = (function(){
    var USERS_KEY = 'Echo0_Users';
    var SESSION_KEY = 'Echo0_Session';
    var TIMELINE_PREFIX = 'Echo0_Timeline_';
    var FRIENDS_PREFIX = 'Echo0_Friends_';
    var DRAFT_KEY = 'Echo0_Draft';

    function load(key, fallback){
      try{
        var raw = localStorage.getItem(key);
        if (!raw) return fallback;
        var parsed = JSON.parse(raw);
        return parsed == null ? fallback : parsed;
      }catch(e){ return fallback; }
    }
    function save(key, val){
      try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){}
    }
    return {
      getUsers: function(){ return load(USERS_KEY, {}); },
      saveUsers: function(u){ save(USERS_KEY, u); },
      getSession: function(){ return load(SESSION_KEY, null); },
      setSession: function(c){ save(SESSION_KEY, {callsign:c}); },
      clearSession: function(){ localStorage.removeItem(SESSION_KEY); },
      loadTimeline: function(c){ return load(TIMELINE_PREFIX + c, []); },
      saveTimeline: function(c, list){ save(TIMELINE_PREFIX + c, list); },
      loadFriends: function(c){ return load(FRIENDS_PREFIX + c, {accepted:[], incoming:[], outgoing:[]}); },
      saveFriends: function(c, f){ save(FRIENDS_PREFIX + c, f); },
      saveDraft: function(text){ if (text !== undefined) save(DRAFT_KEY, text); },
      loadDraft: function(){ return load(DRAFT_KEY, ""); },
      // 音效设置
      getSoundPref: function(){ return load('Echo0_Sound', 'on'); },
      setSoundPref: function(v){ save('Echo0_Sound', v); }
    };
  })();

  // ==========================================================
  // 子模块 15.2：哈希工具
  // ==========================================================
  function simpleHash(str){
    var h1 = 0x811c9dc5, h2 = 0x1000193;
    for (var i=0;i<str.length;i++){
      var c = str.charCodeAt(i);
      h1 = (h1 ^ c) >>> 0;
      h1 = Math.imul(h1, 0x01000193) >>> 0;
      h2 = (h2 + c*31 + i) >>> 0;
      h2 = Math.imul(h2, 0x85ebca6b) >>> 0;
    }
    return (h1 >>> 0).toString(16).padStart(8,'0') + (h2 >>> 0).toString(16).padStart(8,'0');
  }
  function hashPassword(password, salt){
    var v = salt + ':' + password;
    for (var r=0;r<2000;r++){ v = simpleHash(v + r); }
    return v;
  }
  function randomSalt(){
    var arr = new Uint32Array(4);
    if (window.crypto && window.crypto.getRandomValues) window.crypto.getRandomValues(arr);
    else for (var i=0;i<4;i++) arr[i] = Math.floor(Math.random()*4294967295);
    return Array.from(arr).map(function(n){return n.toString(16);}).join('');
  }
  function hashToInt(str){
    var h = 0;
    for (var i=0;i<str.length;i++){ h = (Math.imul(31,h) + str.charCodeAt(i)) | 0; }
    return Math.abs(h);
  }

  // ==========================================================
  // 子模块 15.3：音效 (Web Audio + 静音开关)
  // ==========================================================
  var Sound = (function(){
    var audioCtx = null;
    var enabled = false;
    function init(){
      if (!audioCtx){
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        catch(e){}
      }
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }
    function isSoundOn(){
      return Storage.getSoundPref() !== 'off';
    }
    function play(type){
      if (!enabled || !isSoundOn()) return;
      var ctx = init();
      if (!ctx) return;
      try {
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        if (type === 'key') {
          osc.type = 'square';
          osc.frequency.setValueAtTime(600 + Math.random()*200, ctx.currentTime);
          gain.gain.setValueAtTime(0.025, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.03);
          osc.start(); osc.stop(ctx.currentTime + 0.03);
        } else if (type === 'send') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(880, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.12);
          gain.gain.setValueAtTime(0.06, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
          osc.start(); osc.stop(ctx.currentTime + 0.12);
        } else if (type === 'boot') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(120, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(240, ctx.currentTime + 0.6);
          gain.gain.setValueAtTime(0.04, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
          osc.start(); osc.stop(ctx.currentTime + 0.6);
        } else return;
        osc.connect(gain);
        gain.connect(ctx.destination);
      } catch(e){}
    }
    document.addEventListener('click', function once(){ enabled=true; init(); document.removeEventListener('click', once); }, {once:true});
    document.addEventListener('keydown', function once(){ enabled=true; init(); document.removeEventListener('keydown', once); }, {once:true});
    return {
      play: play,
      init: init,
      isEnabled: function(){ return enabled; },
      isSoundOn: isSoundOn,
      toggleSound: function(){
        var current = isSoundOn();
        var newVal = current ? 'off' : 'on';
        Storage.setSoundPref(newVal);
        return newVal === 'on';
      }
    };
  })();

  // ==========================================================
  // 子模块 15.4：背景粒子
  // ==========================================================
  var Particles = (function(){
    var canvas = document.getElementById('bg-canvas');
    var ctx = canvas.getContext('2d');
    var particles = [];
    var COUNT = 140;
    var animId = null;
    function resize(){
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();
    function init(){
      particles = [];
      for (var i=0;i<COUNT;i++){
        particles.push({
          x: Math.random()*canvas.width,
          y: Math.random()*canvas.height,
          r: Math.random()*1.4 + 0.3,
          phase: Math.random()*Math.PI*2,
          speed: (Math.random()*0.15+0.05) / 60
        });
      }
    }
    init();
    function draw(t){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      for (var i=0;i<particles.length;i++){
        var p = particles[i];
        var alpha = 0.02 + 0.01*Math.sin(t*0.00006 + p.phase);
        alpha = Math.max(0, Math.min(0.03, alpha));
        ctx.beginPath();
        ctx.fillStyle = 'rgba(197,197,197,'+alpha.toFixed(4)+')';
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fill();
        p.x += Math.cos(p.phase)*p.speed;
        p.y += Math.sin(p.phase)*p.speed;
        if (p.x < 0) p.x = canvas.width;
        if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height;
        if (p.y > canvas.height) p.y = 0;
      }
      animId = requestAnimationFrame(draw);
    }
    draw(0);
    return { stop: function(){ if (animId) cancelAnimationFrame(animId); } };
  })();

  // ==========================================================
  // 子模块 15.5：量子指纹 & 身份印记
  // ==========================================================
  function drawFingerprint(canvas, len){
    var ctx = canvas.getContext('2d');
    var w = canvas.width, h = canvas.height;
    ctx.clearRect(0,0,w,h);
    ctx.strokeStyle = 'var(--accent, #1F4F4F)';
    ctx.fillStyle = 'var(--accent-glow, rgba(31,79,79,0.25))';
    ctx.lineWidth = 1;
    var mod = len % 3;
    ctx.save();
    ctx.translate(w/2, h/2);
    if (mod === 0){
      var s = 6 + (len % 5);
      ctx.beginPath();
      ctx.moveTo(0,-s); ctx.lineTo(s,0); ctx.lineTo(0,s); ctx.lineTo(-s,0); ctx.closePath();
      ctx.fill(); ctx.stroke();
    } else if (mod === 1){
      var s2 = 5 + (len % 5);
      ctx.beginPath();
      ctx.rect(-s2,-s2, s2*2, s2*2);
      ctx.fill(); ctx.stroke();
    } else {
      var s3 = 7 + (len % 5);
      ctx.beginPath();
      ctx.moveTo(0,-s3); ctx.lineTo(s3,s3); ctx.lineTo(-s3,s3); ctx.closePath();
      ctx.fill(); ctx.stroke();
    }
    ctx.restore();
  }

  function drawSeal(canvas, callsign){
    var ctx = canvas.getContext('2d');
    var w = canvas.width, h = canvas.height;
    ctx.clearRect(0,0,w,h);
    var seed = hashToInt(callsign || '?');
    var spikes = 5 + (seed % 5);
    var rOuter = Math.min(w,h)/2 - 1;
    var rInner = rOuter * (0.35 + (seed % 40)/100);
    var rotation = (seed % 360) * Math.PI/180;
    ctx.save();
    ctx.translate(w/2, h/2);
    ctx.rotate(rotation);
    ctx.beginPath();
    for (var i=0;i<spikes*2;i++){
      var r = (i % 2 === 0) ? rOuter : rInner;
      var ang = (Math.PI*2*i)/(spikes*2);
      var x = Math.cos(ang)*r, y = Math.sin(ang)*r;
      if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle = 'var(--accent, #1F4F4F)';
    ctx.fillStyle = 'rgba(31,79,79,0.18)';
    ctx.lineWidth = 1;
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }

  function drawNetworkIcon(canvas){
    var ctx = canvas.getContext('2d');
    var w = canvas.width, h = canvas.height;
    ctx.clearRect(0,0,w,h);
    ctx.strokeStyle = 'var(--muted, #5A5A5A)';
    ctx.fillStyle = 'var(--muted, #5A5A5A)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(3,12); ctx.lineTo(13,4);
    ctx.moveTo(3,12); ctx.lineTo(13,13);
    ctx.stroke();
    [[3,12],[13,4],[13,13]].forEach(function(p){
      ctx.beginPath(); ctx.arc(p[0],p[1],1.6,0,Math.PI*2); ctx.fill();
    });
  }
  drawNetworkIcon(document.getElementById('friends-icon'));

  // ==========================================================
  // 子模块 15.6：工具函数
  // ==========================================================
  function pad(n,l){ n=String(n); while(n.length<l) n='0'+n; return n; }
  function dayOfYear(d){ var start = new Date(d.getFullYear(),0,0); return Math.floor((d-start)/86400000); }
  function validCallsign(s){ return /^[A-Za-z0-9_\u4e00-\u9fa5]{2,16}$/.test(s); }

  // ==========================================================
  // 子模块 15.7：文本格式 (新增)
  // ==========================================================
  function parseFormatting(text){
    if (!text) return text;
    // 粗体 **text**
    text = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
    // 斜体 *text*
    text = text.replace(/\*(.*?)\*/g, '<i>$1</i>');
    // 删除线 ~~text~~
    text = text.replace(/~~(.*?)~~/g, '<s>$1</s>');
    return text;
  }

  // ==========================================================
  // 子模块 15.8：全局状态
  // ==========================================================
  var State = (function(){
    var session = null, viewing = null, timeline = [], nextSeq = 1;
    var searchMode = false, searchResults = [], filterTag = null;
    var startTime = Date.now();
    function loadTimeline(callsign){
      timeline = Storage.loadTimeline(callsign);
      nextSeq = timeline.reduce(function(m,x){ return Math.max(m, x.seq || 0); }, 0) + 1;
      searchMode = false; searchResults = []; filterTag = null;
    }
    function getRenderList(){
      if (searchMode) return searchResults;
      var list = timeline.slice().sort(function(a,b){ return (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0); });
      if (filterTag) list = list.filter(function(m){ return m.tags && m.tags.indexOf(filterTag) > -1; });
      return list;
    }
    function isForeignView(){ return viewing !== session; }
    return {
      setSession: function(c){ session = c; },
      getSession: function(){ return session; },
      setViewing: function(c){ viewing = c; },
      getViewing: function(){ return viewing; },
      getTimeline: function(){ return timeline; },
      setTimeline: function(t){ timeline = t; },
      getNextSeq: function(){ return nextSeq; },
      setNextSeq: function(n){ nextSeq = n; },
      getSearchMode: function(){ return searchMode; },
      setSearchMode: function(v){ searchMode = v; },
      getSearchResults: function(){ return searchResults; },
      setSearchResults: function(r){ searchResults = r; },
      getFilterTag: function(){ return filterTag; },
      setFilterTag: function(t){ filterTag = t; },
      getRenderList: getRenderList,
      isForeignView: isForeignView,
      loadTimeline: loadTimeline,
      getStartTime: function(){ return startTime; }
    };
  })();

  // ==========================================================
  // 子模块 15.9：渲染核心 (含格式化 & 打字机光标)
  // ==========================================================
  var Render = (function(){
    var timelineEl = document.getElementById('timeline');
    var timelineWrap = document.getElementById('timeline-wrap');
    var padTop = document.getElementById('timeline-pad-top');
    var padBottom = document.getElementById('timeline-pad-bottom');
    var emptyState = document.getElementById('empty-state');
    var echoInput = document.getElementById('echo-input');
    var VIRTUAL_THRESHOLD = 500, VIRTUAL_WINDOW = 10, ROW_HEIGHT_ESTIMATE = 90;

    function autoGrow(){
      echoInput.style.height = 'auto';
      echoInput.style.height = echoInput.scrollHeight + 'px';
    }

    function renderTags(msg){
      if (!msg.tags || msg.tags.length === 0) return null;
      var wrap = document.createElement('span');
      wrap.style.marginLeft = '8px';
      msg.tags.forEach(function(tag){
        var t = document.createElement('span');
        t.className = 'tag-entity';
        t.textContent = tag;
        t.addEventListener('click', function(e){
          e.stopPropagation();
          State.setFilterTag(tag);
          renderAll();
          showCmdFeedback('> 筛选 #' + tag);
        });
        wrap.appendChild(t);
        wrap.appendChild(document.createTextNode(' '));
      });
      return wrap;
    }

    function buildRow(msg, highlightText, withCursor){
      var row = document.createElement('div');
      row.className = 'msg-row';
      row.dataset.seq = msg.seq;
      if (msg.pinned) row.classList.add('pinned');

      var idSpan = document.createElement('span');
      idSpan.className = 'msg-id';
      var idContent = '#' + pad(msg.seq, 5);
      if (msg.pinned) idContent = '[★] ' + idContent;
      idSpan.textContent = idContent;

      var bodySpan = document.createElement('span');
      bodySpan.className = 'msg-body';

      if (msg.collapsed){
        bodySpan.classList.add('collapsed-text');
        bodySpan.textContent = msg.collapsedText;
        var note = document.createElement('span');
        note.className = 'msg-collapsed-note';
        note.textContent = '<< 此信息已于 ' + msg.collapsedAt + ' 坍缩 >>';
        bodySpan.appendChild(document.createElement('br'));
        bodySpan.appendChild(note);
      } else {
        var displayText = msg.text;
        var content = displayText;

        // 搜索高亮
        if (highlightText && displayText.toLowerCase().includes(highlightText.toLowerCase())){
          var parts = displayText.split(new RegExp('(' + highlightText.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi'));
          var fragment = document.createDocumentFragment();
          for (var p=0;p<parts.length;p++){
            var part = parts[p];
            if (part.toLowerCase() === highlightText.toLowerCase()){
              var span = document.createElement('span');
              span.className = 'highlight';
              span.textContent = part;
              fragment.appendChild(span);
            } else {
              fragment.appendChild(document.createTextNode(part));
            }
          }
          bodySpan.appendChild(fragment);
        } else {
          // 应用文本格式 (新增)
          bodySpan.innerHTML = parseFormatting(content);
        }

        if (msg.editedAt){
          var editTag = document.createElement('span');
          editTag.className = 'msg-edited-tag';
          editTag.textContent = '[edited at ' + msg.editedAt + ']';
          bodySpan.appendChild(editTag);
        }
        var tagWrap = renderTags(msg);
        if (tagWrap) bodySpan.appendChild(tagWrap);

        // 打字机光标 (新增)
        if (withCursor) {
          var cursorSpan = document.createElement('span');
          cursorSpan.className = 'typing-cursor';
          bodySpan.appendChild(cursorSpan);
          // 1秒后移除
          setTimeout(function(){
            if (cursorSpan.parentNode) cursorSpan.parentNode.removeChild(cursorSpan);
          }, 1000);
        }
      }

      var printCanvas = document.createElement('canvas');
      printCanvas.className = 'msg-print';
      printCanvas.width = 20; printCanvas.height = 20;
      row.appendChild(idSpan);
      row.appendChild(bodySpan);
      row.appendChild(printCanvas);

      var len = msg.collapsed ? msg.collapsedText : msg.text;
      drawFingerprint(printCanvas, len.length);

      // 长按触控
      var longPressTimer = null;
      row.addEventListener('touchstart', function(e){
        longPressTimer = setTimeout(function(){
          e.preventDefault();
          openMessageMenu(e, msg);
        }, 500);
      });
      row.addEventListener('touchmove', function(){ clearTimeout(longPressTimer); });
      row.addEventListener('touchend', function(){ clearTimeout(longPressTimer); });
      row.addEventListener('contextmenu', function(e){
        e.preventDefault();
        openMessageMenu(e, msg);
      });

      setTimeout(function(){ row.classList.add('entered'); }, 10);
      return row;
    }

    function renderAll(highlightText){
      updateEmptyState();
      timelineEl.innerHTML = '';
      var list = State.getRenderList();
      if (list.length <= VIRTUAL_THRESHOLD || State.getSearchMode() || State.getFilterTag()){
        padTop.style.height = '0px'; padBottom.style.height = '0px';
        list.forEach(function(m){ timelineEl.appendChild(buildRow(m, highlightText, false)); });
      } else {
        renderVirtual(highlightText);
      }
    }

    function renderVirtual(highlightText){
      var scrollTop = timelineWrap.scrollTop;
      var list = State.getRenderList();
      var centerIndex = Math.floor(scrollTop / ROW_HEIGHT_ESTIMATE);
      var start = Math.max(0, centerIndex - VIRTUAL_WINDOW);
      var end = Math.min(list.length, centerIndex + VIRTUAL_WINDOW);
      padTop.style.height = (start * ROW_HEIGHT_ESTIMATE) + 'px';
      padBottom.style.height = ((list.length - end) * ROW_HEIGHT_ESTIMATE) + 'px';
      timelineEl.innerHTML = '';
      for (var i=start; i<end; i++){ timelineEl.appendChild(buildRow(list[i], highlightText, false)); }
    }

    function updateEmptyState(){
      var list = State.getRenderList();
      var show = list.length === 0;
      if (show) {
        emptyState.classList.remove('fade-out');
        emptyState.classList.add('fade-in');
        var tag = State.getFilterTag();
        if (tag) emptyState.textContent = '没有 #' + tag + ' 标签的回声';
        else if (State.getSearchMode()) emptyState.textContent = '没有匹配的回声';
        else emptyState.textContent = State.isForeignView() ? '此频率暂无回声' : '寂静也是一种回响';
        emptyState.style.display = 'block';
      } else {
        emptyState.classList.remove('fade-in');
        emptyState.classList.add('fade-out');
        setTimeout(function(){
          if (State.getRenderList().length === 0) return;
          emptyState.style.display = 'none';
        }, 700);
      }
    }

    function appendMessage(msg){
      if (State.getSearchMode()) { State.setSearchMode(false); State.setSearchResults([]); State.setFilterTag(null); }
      var list = State.getRenderList();
      // 新消息带打字机光标
      var row = buildRow(msg, null, true);
      if (list.length <= VIRTUAL_THRESHOLD){
        timelineEl.appendChild(row);
      } else {
        renderVirtual();
        row = timelineEl.querySelector('.msg-row:last-child');
      }
      row.classList.add('ripple');
      var ripple = document.getElementById('input-ripple');
      ripple.classList.remove('animate');
      void ripple.offsetWidth;
      ripple.classList.add('animate');
      setTimeout(function(){ row.classList.remove('ripple'); }, 900);
      updateEmptyState();
      timelineWrap.scrollTop = timelineWrap.scrollHeight;
    }

    return {
      renderAll: renderAll,
      appendMessage: appendMessage,
      updateEmptyState: updateEmptyState,
      autoGrow: autoGrow,
      getTimelineWrap: function(){ return timelineWrap; },
      getTimelineEl: function(){ return timelineEl; }
    };
  })();

  // ==========================================================
  // 子模块 15.10：命令系统 (含别名)
  // ==========================================================
  var Commands = (function(){
    var registry = [
      { cmd: 'search', desc: '<词> 搜索', aliases: ['s'] },
      { cmd: 'clearsearch', desc: '退出搜索', aliases: ['cs'] },
      { cmd: 'clear', desc: '清屏归档', aliases: ['c'] },
      { cmd: 'export', desc: '导出宇宙', aliases: ['exp'] },
      { cmd: 'import', desc: '导入宇宙', aliases: ['imp'] },
      { cmd: 'stats', desc: '系统诊断', aliases: ['st'] },
      { cmd: 'analytics', desc: '回声统计', aliases: ['ana'] },
      { cmd: 'calendar', desc: '消息日历', aliases: ['cal'] },
      { cmd: 'random', desc: '随机回溯', aliases: ['rnd'] },
      { cmd: 'edit', desc: '<序号> <新内容> 编辑', aliases: ['e'] },
      { cmd: 'pin', desc: '<序号> 置顶', aliases: ['p'] },
      { cmd: 'unpin', desc: '<序号> 取消置顶', aliases: ['up'] },
      { cmd: 'goto', desc: '<序号> 跳转', aliases: ['g'] },
      { cmd: 'theme', desc: '<default|amber|green>', aliases: ['t'] },
      { cmd: 'tag', desc: '<序号> <标签> 添加', aliases: ['ta'] },
      { cmd: 'untag', desc: '<序号> <标签> 移除', aliases: ['un'] },
      { cmd: 'filter', desc: '<标签> 筛选', aliases: ['f'] },
      { cmd: 'clearfilter', desc: '清除筛选', aliases: ['cf'] },
      { cmd: 'sound', desc: '音效开关', aliases: ['snd'] },
      { cmd: 'help', desc: '显示帮助', aliases: ['h', '?'] }
    ];

    // 构建别名映射
    var aliasMap = {};
    registry.forEach(function(cmd){
      cmd.aliases.forEach(function(alias){
        aliasMap[alias] = cmd.cmd;
      });
    });

    function resolveAlias(cmdName){
      return aliasMap[cmdName] || cmdName;
    }

    return {
      registry: registry,
      resolveAlias: resolveAlias,
      getAliasMap: function(){ return aliasMap; }
    };
  })();

  // ==========================================================
  // 子模块 15.11：命令处理器 & 联想 (集成别名)
  // ==========================================================
  var cmdFeedback = document.getElementById('cmd-feedback');
  function showCmdFeedback(msg){
    cmdFeedback.textContent = msg;
    cmdFeedback.classList.add('show');
    setTimeout(function(){ cmdFeedback.classList.remove('show'); }, 4000);
  }

  var autoCompleteEl = document.getElementById('cmd-autocomplete');
  var acSelectedIndex = -1;
  var acItems = [];

  function updateAutocomplete(inputText){
    if (!inputText.startsWith('/')) { closeAutocomplete(); return; }
    var rawSearch = inputText.substring(1).toLowerCase();
    // 检查是否匹配别名或命令本身
    var matches = Commands.registry.filter(function(c){
      if (c.cmd.startsWith(rawSearch)) return true;
      for (var i=0; i<c.aliases.length; i++){
        if (c.aliases[i].startsWith(rawSearch)) return true;
      }
      return false;
    });
    // 去重
    var unique = [];
    var seen = {};
    matches.forEach(function(c){
      if (!seen[c.cmd]) { seen[c.cmd] = true; unique.push(c); }
    });
    if (unique.length === 0) { closeAutocomplete(); return; }
    autoCompleteEl.innerHTML = '';
    acItems = [];
    unique.forEach(function(c, idx){
      var div = document.createElement('div');
      div.className = 'ac-item' + (idx === 0 ? ' active' : '');
      var cmdSpan = document.createElement('span'); cmdSpan.className = 'ac-cmd';
      // 显示原始命令 + 别名提示
      var displayCmd = '/' + c.cmd;
      if (c.aliases.length > 0) displayCmd += ' (/' + c.aliases[0] + ')';
      cmdSpan.textContent = displayCmd;
      var descSpan = document.createElement('span'); descSpan.className = 'ac-desc'; descSpan.textContent = c.desc;
      div.appendChild(cmdSpan); div.appendChild(descSpan);
      div.dataset.cmd = c.cmd;
      div.addEventListener('click', function(e){ e.stopPropagation(); selectCommand(c.cmd); });
      autoCompleteEl.appendChild(div);
      acItems.push(div);
    });
    acSelectedIndex = 0;
    autoCompleteEl.classList.add('open');
  }

  function closeAutocomplete(){
    autoCompleteEl.classList.remove('open');
    autoCompleteEl.innerHTML = '';
    acItems = [];
    acSelectedIndex = -1;
  }

  function selectCommand(cmd){
    var input = document.getElementById('echo-input');
    input.value = '/' + cmd + ' ';
    closeAutocomplete();
    input.focus();
    var evt = document.createEvent('HTMLEvents');
    evt.initEvent('input', true, false);
    input.dispatchEvent(evt);
  }

  function navigateAutocomplete(direction){
    if (!autoCompleteEl.classList.contains('open') || acItems.length === 0) return;
    if (acSelectedIndex >= 0 && acSelectedIndex < acItems.length) acItems[acSelectedIndex].classList.remove('active');
    acSelectedIndex = (acSelectedIndex + direction + acItems.length) % acItems.length;
    acItems[acSelectedIndex].classList.add('active');
    acItems[acSelectedIndex].scrollIntoView({block: 'nearest'});
  }

  function executeSelectedCommand(){
    if (!autoCompleteEl.classList.contains('open') || acItems.length === 0 || acSelectedIndex < 0) return;
    selectCommand(acItems[acSelectedIndex].dataset.cmd);
  }

  // 命令执行主函数 (含别名解析 & 音效切换)
  function handleCommand(text){
    var parts = text.trim().split(/\s+/);
    var rawCmd = parts[0].toLowerCase();
    // 解析别名
    var cmd = '/' + Commands.resolveAlias(rawCmd.substring(1));
    var args = parts.slice(1);

    if (cmd === '/help'){
      showCmdFeedback(
        '[HELP] 别名: /s=search, /e=edit, /p=pin, /g=goto, /t=theme, /f=filter, /snd=sound\n' +
        '/search <词> | /analytics | /calendar | /random | /clear | /export | /import | /edit <seq> <新> | /pin <seq> | /unpin <seq> | /goto <seq> | /tag <seq> <标签> | /untag <seq> <标签> | /filter <标签> | /clearfilter | /theme <default|amber|green> | /sound'
      );
      return true;
    }

    // ---- 音效开关 (新增) ----
    if (cmd === '/sound' || cmd === '/snd') {
      var newState = Sound.toggleSound();
      showCmdFeedback('> 音效 ' + (newState ? '已开启' : '已关闭'));
      return true;
    }

    if (cmd === '/search'){
      if (args.length === 0){ showCmdFeedback('>> 用法: /search <关键词>'); return true; }
      var keyword = args.join(' ');
      State.setSearchMode(true);
      State.setFilterTag(null);
      var lower = keyword.toLowerCase();
      var results = State.getTimeline().filter(function(m){ return !m.collapsed && m.text.toLowerCase().includes(lower); });
      State.setSearchResults(results);
      Render.renderAll(keyword);
      showCmdFeedback('> 找到 ' + results.length + ' 条匹配结果');
      return true;
    }
    if (cmd === '/clearsearch' || (cmd === '/search' && args.length === 0)){
      State.setSearchMode(false);
      State.setSearchResults([]);
      Render.renderAll();
      showCmdFeedback('> 已退出搜索模式');
      return true;
    }

    if (cmd === '/clear'){ archiveClear(); showCmdFeedback('> 已执行清屏归档'); return true; }
    if (cmd === '/export'){ exportUniverse(); return true; }
    if (cmd === '/import'){ document.getElementById('import-input').click(); return true; }
    if (cmd === '/stats'){ showSysDiagnostics(); return true; }
    if (cmd === '/analytics'){ showAnalytics(); return true; }
    if (cmd === '/calendar'){ showCalendar(); return true; }

    if (cmd === '/random'){
      var timeline = State.getTimeline();
      if (timeline.length === 0){ showCmdFeedback('>> 时间线为空'); return true; }
      var idx = Math.floor(Math.random() * timeline.length);
      var target = timeline[idx];
      if (State.getSearchMode()) { State.setSearchMode(false); State.setSearchResults([]); State.setFilterTag(null); Render.renderAll(); }
      var row = document.querySelector('.msg-row[data-seq="' + target.seq + '"]');
      if (row){
        row.scrollIntoView({block:'center'});
        row.style.transition = 'background 0.6s ease, box-shadow 0.6s ease';
        row.style.background = 'var(--highlight-bg)';
        row.style.boxShadow = '0 0 30px var(--accent-glow)';
        setTimeout(function(){
          row.style.background = 'transparent';
          row.style.boxShadow = 'none';
        }, 1200);
        showCmdFeedback('> 你曾在此停留 · #' + pad(target.seq,5));
      } else {
        var estTop = timeline.findIndex(function(m){return m.seq===target.seq;}) * 90;
        Render.getTimelineWrap().scrollTop = estTop - Render.getTimelineWrap().clientHeight/2;
        showCmdFeedback('> 回溯到 #' + pad(target.seq,5));
        setTimeout(function(){ Render.renderAll(); }, 200);
      }
      return true;
    }

    if (cmd === '/edit'){
      if (args.length < 2){ showCmdFeedback('>> 用法: /edit <序号> <新内容>'); return true; }
      var seqNum = parseInt(args[0], 10);
      if (isNaN(seqNum)){ showCmdFeedback('>> 序号必须为数字'); return true; }
      var newText = args.slice(1).join(' ');
      var found = false;
      var timeline = State.getTimeline();
      for (var i=0;i<timeline.length;i++){
        if (timeline[i].seq === seqNum && !timeline[i].collapsed){
          timeline[i].text = newText;
          timeline[i].editedAt = new Date().toLocaleTimeString('zh-CN', {hour12:false});
          Storage.saveTimeline(State.getSession(), timeline);
          if (State.getSearchMode()) { State.setSearchMode(false); State.setSearchResults([]); }
          Render.renderAll();
          showCmdFeedback('> 消息 #' + pad(seqNum,5) + ' 已修正');
          found = true; break;
        }
      }
      if (!found) showCmdFeedback('>> 未找到可编辑的消息 #' + pad(seqNum,5));
      return true;
    }

    if (cmd === '/pin'){
      if (args.length === 0){ showCmdFeedback('>> 用法: /pin <序号>'); return true; }
      var seqNum = parseInt(args[0], 10);
      if (isNaN(seqNum)){ showCmdFeedback('>> 序号必须为数字'); return true; }
      var found = false;
      var timeline = State.getTimeline();
      for (var i=0;i<timeline.length;i++){
        if (timeline[i].seq === seqNum && !timeline[i].collapsed){
          timeline[i].pinned = true;
          Storage.saveTimeline(State.getSession(), timeline);
          if (State.getSearchMode()) { State.setSearchMode(false); State.setSearchResults([]); }
          Render.renderAll();
          showCmdFeedback('> 消息 #' + pad(seqNum,5) + ' 已置顶');
          found = true; break;
        }
      }
      if (!found) showCmdFeedback('>> 未找到可置顶的消息 #' + pad(seqNum,5));
      return true;
    }

    if (cmd === '/unpin'){
      if (args.length === 0){ showCmdFeedback('>> 用法: /unpin <序号>'); return true; }
      var seqNum = parseInt(args[0], 10);
      if (isNaN(seqNum)){ showCmdFeedback('>> 序号必须为数字'); return true; }
      var found = false;
      var timeline = State.getTimeline();
      for (var i=0;i<timeline.length;i++){
        if (timeline[i].seq === seqNum){
          timeline[i].pinned = false;
          Storage.saveTimeline(State.getSession(), timeline);
          if (State.getSearchMode()) { State.setSearchMode(false); State.setSearchResults([]); }
          Render.renderAll();
          showCmdFeedback('> 消息 #' + pad(seqNum,5) + ' 已取消置顶');
          found = true; break;
        }
      }
      if (!found) showCmdFeedback('>> 未找到消息 #' + pad(seqNum,5));
      return true;
    }

    if (cmd === '/goto'){
      if (args.length === 0){ showCmdFeedback('>> 用法: /goto <序号>'); return true; }
      var seqNum = parseInt(args[0], 10);
      if (isNaN(seqNum)){ showCmdFeedback('>> 序号必须为数字'); return true; }
      if (State.getSearchMode()) { State.setSearchMode(false); State.setSearchResults([]); State.setFilterTag(null); Render.renderAll(); }
      var timeline = State.getTimeline();
      var idx = timeline.findIndex(function(m){ return m.seq === seqNum; });
      if (idx === -1){ showCmdFeedback('>> 未找到消息 #' + pad(seqNum,5)); return true; }
      var targetRow = document.querySelector('.msg-row[data-seq="' + seqNum + '"]');
      if (targetRow){
        targetRow.scrollIntoView({block:'center'});
        showCmdFeedback('> 跳转到 #' + pad(seqNum,5));
      } else {
        var estimatedTop = idx * 90;
        Render.getTimelineWrap().scrollTop = estimatedTop - Render.getTimelineWrap().clientHeight/2;
        showCmdFeedback('> 尝试跳转到 #' + pad(seqNum,5));
      }
      return true;
    }

    if (cmd === '/theme'){
      if (args.length === 0){ showCmdFeedback('>> 主题: default, amber, green'); return true; }
      var theme = args[0].toLowerCase();
      if (['default','amber','green'].indexOf(theme) === -1){ showCmdFeedback('>> 可选: default, amber, green'); return true; }
      document.body.className = '';
      if (theme !== 'default') {
        document.body.classList.add('theme-' + theme);
        localStorage.setItem('Echo0_Theme', theme);
      } else {
        localStorage.removeItem('Echo0_Theme');
      }
      showCmdFeedback('> 主题切换至: ' + theme);
      return true;
    }

    if (cmd === '/tag'){
      if (args.length < 2){ showCmdFeedback('>> 用法: /tag <序号> <标签>'); return true; }
      var seqNum = parseInt(args[0], 10);
      if (isNaN(seqNum)){ showCmdFeedback('>> 序号必须为数字'); return true; }
      var tag = args[1];
      if (!/^[a-zA-Z0-9_\u4e00-\u9fa5]+$/.test(tag)){ showCmdFeedback('>> 标签只允许字母数字下划线汉字'); return true; }
      var found = false;
      var timeline = State.getTimeline();
      for (var i=0;i<timeline.length;i++){
        if (timeline[i].seq === seqNum && !timeline[i].collapsed){
          if (!timeline[i].tags) timeline[i].tags = [];
          if (timeline[i].tags.indexOf(tag) === -1) {
            timeline[i].tags.push(tag);
            Storage.saveTimeline(State.getSession(), timeline);
            if (State.getSearchMode()) { State.setSearchMode(false); State.setSearchResults([]); }
            Render.renderAll();
            showCmdFeedback('> #' + tag + ' 已添加到 #' + pad(seqNum,5));
          } else {
            showCmdFeedback('>> 已存在标签 #' + tag);
          }
          found = true; break;
        }
      }
      if (!found) showCmdFeedback('>> 未找到消息 #' + pad(seqNum,5));
      return true;
    }

    if (cmd === '/untag'){
      if (args.length < 2){ showCmdFeedback('>> 用法: /untag <序号> <标签>'); return true; }
      var seqNum = parseInt(args[0], 10);
      if (isNaN(seqNum)){ showCmdFeedback('>> 序号必须为数字'); return true; }
      var tag = args[1];
      var found = false;
      var timeline = State.getTimeline();
      for (var i=0;i<timeline.length;i++){
        if (timeline[i].seq === seqNum && !timeline[i].collapsed){
          if (timeline[i].tags) {
            var idx2 = timeline[i].tags.indexOf(tag);
            if (idx2 > -1) {
              timeline[i].tags.splice(idx2, 1);
              Storage.saveTimeline(State.getSession(), timeline);
              if (State.getSearchMode()) { State.setSearchMode(false); State.setSearchResults([]); }
              Render.renderAll();
              showCmdFeedback('> #' + tag + ' 已从 #' + pad(seqNum,5) + ' 移除');
            } else {
              showCmdFeedback('>> 该消息没有标签 #' + tag);
            }
          } else {
            showCmdFeedback('>> 该消息没有标签');
          }
          found = true; break;
        }
      }
      if (!found) showCmdFeedback('>> 未找到消息 #' + pad(seqNum,5));
      return true;
    }

    if (cmd === '/filter'){
      if (args.length === 0){ showCmdFeedback('>> 用法: /filter <标签>'); return true; }
      var tag = args[0];
      State.setFilterTag(tag);
      State.setSearchMode(false);
      State.setSearchResults([]);
      Render.renderAll();
      showCmdFeedback('> 筛选 #' + tag);
      return true;
    }

    if (cmd === '/clearfilter'){
      State.setFilterTag(null);
      Render.renderAll();
      showCmdFeedback('> 已清除筛选');
      return true;
    }

    showCmdFeedback('>> 未知命令，输入 /help 查看可用指令');
    return true;
  }

  // ==========================================================
  // 子模块 15.12：统计 & 日历 (无变化)
  // ==========================================================
  function showAnalytics(){
    var overlay = document.getElementById('stats-overlay');
    var box = document.getElementById('stats-box');
    var timeline = State.getTimeline();
    var total = timeline.length;
    if (total === 0) {
      box.innerHTML = '<div class="s-title">ECHO STATISTICS</div><div style="color:var(--muted);padding:16px 0;">时间线为空</div><div class="s-close" onclick="document.getElementById(\'stats-overlay\').classList.remove(\'show\')">[关闭]</div>';
      overlay.classList.add('show');
      return;
    }
    var totalChars = timeline.reduce(function(s,m){ return s + (m.collapsed ? m.collapsedText.length : m.text.length); }, 0);
    var avgLen = Math.round(totalChars / total);
    var days = Math.max(1, Math.ceil((Date.now() - State.getStartTime()) / 86400000));
    var perDay = (total / days).toFixed(1);
    var maxLen = 0, maxMsg = '';
    var wordCount = {};
    timeline.forEach(function(m){
      if (m.collapsed) return;
      var words = m.text.split(/\s+/).filter(function(w){return w.length>1;});
      words.forEach(function(w){
        var key = w.toLowerCase().replace(/[^a-z\u4e00-\u9fa5]/g,'');
        if (key.length<2) return;
        wordCount[key] = (wordCount[key]||0) + 1;
      });
      if (m.text.length > maxLen) { maxLen = m.text.length; maxMsg = m.text.slice(0,30)+'...'; }
    });
    var sortedWords = Object.entries(wordCount).sort(function(a,b){return b[1]-a[1];});
    var topWords = sortedWords.slice(0,5).map(function(w){ return w[0] + '(' + w[1] + ')'; }).join('  ') || '暂无';

    var todayCount = 0;
    var today = new Date().toDateString();
    timeline.forEach(function(m){
      if (m.createdAt && new Date(m.createdAt).toDateString() === today) todayCount++;
    });

    box.innerHTML =
      '<div class="s-title">ECHO STATISTICS</div>' +
      '<div class="s-row"><span class="s-label">总消息数</span><span class="s-value stat-digit">' + total + '</span></div>' +
      '<div class="s-row"><span class="s-label">总字数</span><span class="s-value stat-digit">' + totalChars + '</span></div>' +
      '<div class="s-row"><span class="s-label">平均长度</span><span class="s-value stat-digit">' + avgLen + ' 字符</span></div>' +
      '<div class="s-row"><span class="s-label">日均消息</span><span class="s-value stat-digit">' + perDay + '</span></div>' +
      '<div class="s-row"><span class="s-label">今日消息</span><span class="s-value stat-digit">' + todayCount + '</span></div>' +
      '<div class="s-row"><span class="s-label">最长消息</span><span class="s-value stat-digit">' + maxLen + ' 字符</span></div>' +
      (maxMsg ? '<div class="s-row" style="font-size:clamp(10px,2vw,12px);border-bottom:none;padding-top:0;"><span class="s-label">↳</span><span class="s-value" style="color:var(--muted);">' + maxMsg + '</span></div>' : '') +
      '<div class="s-row"><span class="s-label">高频词汇</span><span class="s-value" style="font-size:clamp(10px,2vw,12px);">' + topWords + '</span></div>' +
      '<div class="s-close" onclick="document.getElementById(\'stats-overlay\').classList.remove(\'show\')">[关闭]</div>';
    overlay.classList.add('show');
    document.querySelectorAll('.stat-digit').forEach(function(el){ el.classList.add('pop'); });
  }

  function showCalendar(){
    var overlay = document.getElementById('cal-overlay');
    var box = document.getElementById('cal-box');
    var now = new Date();
    var days = [];
    for (var d=29; d>=0; d--){
      var dt = new Date(now); dt.setDate(dt.getDate() - d);
      var key = dt.toDateString();
      var count = State.getTimeline().filter(function(m){
        return m.createdAt && new Date(m.createdAt).toDateString() === key;
      }).length;
      days.push({ date: dt, count: count, key: key });
    }
    var first = days[0].date;
    var startDay = first.getDay();
    var html = '<div class="c-title">消息日历 · 最近 30 天</div><div class="cal-grid">';
    ['日','一','二','三','四','五','六'].forEach(function(w){
      html += '<div style="font-size:clamp(8px,1.6vw,10px);color:var(--muted);text-align:center;padding:4px 0;">' + w + '</div>';
    });
    for (var i=0; i<startDay; i++){ html += '<div class="cal-cell empty"></div>'; }
    days.forEach(function(day){
      var cls = 'cal-cell' + (day.count > 0 ? ' has-msg' : '');
      var label = day.date.getDate();
      var cnt = day.count > 0 ? '<span class="cnt">' + day.count + '</span>' : '';
      var clickable = day.count > 0 ? ' onclick="window.jumpToDate(\'' + day.key + '\')"' : '';
      html += '<div class="' + cls + '"' + clickable + '>' + label + cnt + '</div>';
    });
    html += '</div><div class="c-close" onclick="document.getElementById(\'cal-overlay\').classList.remove(\'show\')">[关闭]</div>';
    box.innerHTML = html;
    overlay.classList.add('show');
  }

  window.jumpToDate = function(dateKey){
    var idx = State.getTimeline().findIndex(function(m){
      return m.createdAt && new Date(m.createdAt).toDateString() === dateKey;
    });
    if (idx === -1) return;
    var target = State.getTimeline()[idx];
    document.getElementById('cal-overlay').classList.remove('show');
    if (State.getSearchMode()) { State.setSearchMode(false); State.setSearchResults([]); State.setFilterTag(null); Render.renderAll(); }
    var row = document.querySelector('.msg-row[data-seq="' + target.seq + '"]');
    if (row) {
      row.scrollIntoView({block:'center'});
      row.style.transition = 'background 0.6s ease, box-shadow 0.6s ease';
      row.style.background = 'var(--highlight-bg)';
      row.style.boxShadow = '0 0 30px var(--accent-glow)';
      setTimeout(function(){ row.style.background = 'transparent'; row.style.boxShadow = 'none'; }, 1200);
    } else {
      var estTop = idx * 90;
      Render.getTimelineWrap().scrollTop = estTop - Render.getTimelineWrap().clientHeight/2;
    }
    showCmdFeedback('> 跳转到 ' + dateKey);
  };

  // ==========================================================
  // 子模块 15.13：导出 / 导入
  // ==========================================================
  function exportUniverse(){
    var data = {
      type: 'ECHO0_UNIVERSE',
      version: '1.2',
      exportedAt: new Date().toISOString(),
      callsign: State.getSession(),
      timeline: State.getTimeline(),
      friends: Storage.loadFriends(State.getSession()),
      users: Storage.getUsers()
    };
    var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'echo0_universe_' + State.getSession() + '_' + Date.now() + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showCmdFeedback('> 宇宙已导出');
  }

  function importUniverse(file){
    var reader = new FileReader();
    reader.onload = function(e){
      try{
        var data = JSON.parse(e.target.result);
        if (data.type !== 'ECHO0_UNIVERSE'){ showCmdFeedback('>> 无效的宇宙备份文件'); return; }
        if (data.timeline && Array.isArray(data.timeline)){
          State.setTimeline(data.timeline);
          Storage.saveTimeline(State.getSession(), data.timeline);
          State.setNextSeq(data.timeline.reduce(function(m,x){ return Math.max(m, x.seq || 0); }, 0) + 1);
        }
        if (data.friends) Storage.saveFriends(State.getSession(), data.friends);
        if (data.users) Storage.saveUsers(data.users);
        State.setSearchMode(false); State.setSearchResults([]); State.setFilterTag(null);
        Render.renderAll();
        refreshFriendBadge();
        showCmdFeedback('> 宇宙已成功导入 (' + State.getTimeline().length + ' 条回声)');
      }catch(err){
        showCmdFeedback('>> 导入失败: ' + err.message);
      }
    };
    reader.readAsText(file);
  }
  document.getElementById('import-input').addEventListener('change', function(e){
    if (this.files.length > 0) importUniverse(this.files[0]);
    this.value = '';
  });

  function respondRequest(fromName, accept){
    var self = Storage.loadFriends(State.getSession());
    var other = Storage.loadFriends(fromName);
    self.incoming = self.incoming.filter(function(c){return c!==fromName;});
    other.outgoing = other.outgoing.filter(function(c){return c!==State.getSession();});
    if (accept){ self.accepted.push(fromName); other.accepted.push(State.getSession()); }
    Storage.saveFriends(State.getSession(), self);
    Storage.saveFriends(fromName, other);
    renderFriendsPanel();
  }

  function cancelOutgoing(targetName){
    var self = Storage.loadFriends(State.getSession());
    var other = Storage.loadFriends(targetName);
    self.outgoing = self.outgoing.filter(function(c){return c!==targetName;});
    other.incoming = other.incoming.filter(function(c){return c!==State.getSession();});
    Storage.saveFriends(State.getSession(), self);

  document.getElementById('fp-add-btn').addEventListener('click', function(){

    fpAddMsg.textContent = '';

    if (!validCallsign(target)){ fpAddMsg.textContent = '>> 频率代号格式不正确'; return; }
    if (target === State.getSession()){ fpAddMsg.textContent = '>> 无法与自身共振'; return; }
    var users = Storage.getUsers();
    if (!users[target]){ fpAddMsg.textContent = '>> 此终端内不存在该频率'; return; }

    var self = Storage.loadFriends(State.getSession());
    if (self.accepted.indexOf(target) > -1){ fpAddMsg.textContent = '>> 已处于共振状态'; return; }
    if (self.outgoing.indexOf(target) > -1){ fpAddMsg.textContent = '>> 请求已发出，等待响应'; return; }

    var other = Storage.loadFriends(target);
    if (other.outgoing.indexOf(State.getSession()) > -1){
      other.outgoing = other.outgoing.filter(function(c){return c!==State.getSession();});
      other.accepted.push(State.getSession());
      self.incoming = self.incoming.filter(function(c){return c!==target;});
      self.accepted.push(target);
      Storage.saveFriends(target, other);
      Storage.saveFriends(State.getSession(), self);
      fpAddMsg.textContent = '';
    } else {
      self.outgoing.push(target);
      if (other.incoming.indexOf(State.getSession()) === -1) other.incoming.push(State.getSession());
      Storage.saveFriends(State.getSession(), self);
      Storage.saveFriends(target, other);
    }
    fpAddInput.value = '';
    renderFriendsPanel();
  });

  function positionMenu(x, y, el){
    var w = el.offsetWidth || 180;
    var h = el.offsetHeight || 200;
    var left = Math.min(x, window.innerWidth - w - 10);
    var top = Math.min(y, window.innerHeight - h - 10);
    el.style.left = Math.max(10, left) + 'px';
    el.style.top = Math.max(10, top) + 'px';
    el.style.setProperty('--mx', Math.min(100, Math.max(0, ((x - left) / w) * 100)) + '%');
    el.style.setProperty('--my', Math.min(100, Math.max(0, ((y - top) / h) * 100)) + '%');
  }

        document.getElementById('quote-bar').classList.add('active');
        input.focus();

    if (!State.isForeignView() && !msg.collapsed){

        var pinItem = makeItem('P', '置顶 ★', false);
        pinItem.addEventListener('click', function(){
          msg.pinned = true;
          Storage.saveTimeline(State.getSession(), State.getTimeline());
          if (State.getSearchMode()) { State.setSearchMode(false); State.setSearchResults([]); }
          Render.renderAll();
          showCmdFeedback('> 消息 #' + pad(msg.seq,5) + ' 已置顶');

      recallItem.addEventListener('click', function(){
        if (!msg.collapsed){
          var len = msg.text.length;
          var chars = '&*#@(%$!?<>{}';

          for (var i=0;i<Math.max(len,4);i++){ garbled += chars[Math.floor(Math.random()*chars.length)]; }
          msg.collapsed = true;
          msg.collapsedText = garbled;

  echoInput.addEventListener('input', function(){

    else closeAutocomplete();

  echoInput.addEventListener('keydown', function(e){
    Sound.play('key');
    if (e.key === 'ArrowDown') { e.preventDefault(); navigateAutocomplete(1); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); navigateAutocomplete(-1); }
    else if (e.key === 'Enter') {
      if (autoCompleteEl.classList.contains('open')) { e.preventDefault(); executeSelectedCommand(); }
    } else if (e.key === 'Escape') {
      if (autoCompleteEl.classList.contains('open')) { e.preventDefault(); closeAutocomplete(); }
    }
  });

  document.addEventListener('keydown', function(e){
    if (e.target === echoInput && e.key === 'Enter' && !e.shiftKey) {
      if (autoCompleteEl.classList.contains('open')) return;
      e.preventDefault();
      sendMessage();
    }
  });

  function sendMessage(){
    if (State.isForeignView()) return;
    var text = echoInput.value;
    if (!text || !text.trim()) return;

    if (State.getSearchMode()) { State.setSearchMode(false); State.setSearchResults([]); State.setFilterTag(null); }

    if (text.startsWith('/')){
      closeAutocomplete();
      handleCommand(text);
      echoInput.value = '';
      Storage.saveDraft('');
      Render.autoGrow();
      quoteBar.classList.remove('active');
      return;
    }

    Sound.play('send');

    var tags = [];
    var cleanText = text;
    var tagMatches = text.match(/#([a-zA-Z0-9_\u4e00-\u9fa5]+)/g);
    if (tagMatches) {
      tagMatches.forEach(function(t){
        var tag = t.substring(1);
        if (tags.indexOf(tag) === -1) tags.push(tag);
        cleanText = cleanText.replace(t, '').trim();
      });
    }

    var msg = {
      seq: State.getNextSeq(),
      text: cleanText || text,
      collapsed: false,
      collapsedText: '',
      collapsedAt: '',
      createdAt: new Date().toISOString(),
      editedAt: null,
      pinned: false,
      tags: tags.length > 0 ? tags : undefined
    };
    State.setNextSeq(State.getNextSeq() + 1);
    var tl = State.getTimeline();
    tl.push(msg);
    Storage.saveTimeline(State.getSession(), tl);
    Render.appendMessage(msg);
    echoInput.value = '';
    Storage.saveDraft('');
    Render.autoGrow();
    quoteBar.classList.remove('active');
  }

  var breathTimer = null;
  function handleTypingPressure(){
    if (echoInput.value.length > 10){
      if (!breathTimer){
        var t0 = Date.now();
        breathTimer = setInterval(function(){
          var t = (Date.now()-t0)/1000;
          var offset = Math.sin(t * (2*Math.PI/3.5)) * 0.02;
          var v = 10 + Math.round((0 + offset) * 255);
          v = Math.max(6, Math.min(20, v));
          document.body.style.backgroundColor = 'rgb('+v+','+v+','+v+')';
        }, 100);
      }
    } else if (breathTimer){
      clearInterval(breathTimer); breathTimer = null;
      document.body.style.backgroundColor = '';
    }
  }

  docScroll.innerHTML = DOC_HTML;

  document.querySelectorAll('.fp-demo').forEach(function(c){
    var len = parseInt(c.dataset.len, 10);
    var ctx = c.getContext('2d');
    var w = c.width, h = c.height;
    ctx.clearRect(0,0,w,h);
    ctx.strokeStyle = 'var(--accent, #1F4F4F)';
    ctx.fillStyle = 'rgba(31,79,79,0.25)';
    ctx.lineWidth = 1;
    var mod = len % 3;
    ctx.save(); ctx.translate(w/2, h/2);
    if (mod === 0){ var s=12; ctx.beginPath(); ctx.moveTo(0,-s); ctx.lineTo(s,0); ctx.lineTo(0,s); ctx.lineTo(-s,0); ctx.closePath(); ctx.fill(); ctx.stroke(); }
    else if (mod === 1){ var s2=10; ctx.beginPath(); ctx.rect(-s2,-s2,s2*2,s2*2); ctx.fill(); ctx.stroke(); }
    else { var s3=13; ctx.beginPath(); ctx.moveTo(0,-s3); ctx.lineTo(s3,s3); ctx.lineTo(-s3,s3); ctx.closePath(); ctx.fill(); ctx.stroke(); }
    ctx.restore();
  });

  var docSealPreview = document.getElementById('doc-seal-preview');
  var docSealInput = document.getElementById('doc-seal-input');
  function drawDocSeal(val){ drawSeal(docSealPreview, val || '?'); }
  drawDocSeal('ECHO_0');
  docSealInput.addEventListener('input', function(){ drawDocSeal(this.value); });

  (function setupDocContextMenu(){
    var zone = document.getElementById('doc-demo-zone');
    var demoText = document.getElementById('doc-demo-text');
    var demoFeedback = document.getElementById('doc-demo-feedback');
    var docCtxMenu = document.getElementById('doc-ctx-menu');

    function closeDocMenu(){
      if (!docCtxMenu.classList.contains('open')) return;
      docCtxMenu.classList.add('closing');
      setTimeout(function(){
        docCtxMenu.classList.remove('open'); docCtxMenu.classList.remove('closing'); docCtxMenu.innerHTML = '';
      }, 360);
    }
    document.addEventListener('click', function(e){
      if (docCtxMenu.classList.contains('open') && !docCtxMenu.contains(e.target) && e.target !== zone && !zone.contains(e.target)) closeDocMenu();
    });
    document.addEventListener('keydown', function(e){
      if (e.key === 'Escape' && docCtxMenu.classList.contains('open')) closeDocMenu();
    });

    zone.addEventListener('touchstart', function(e){
      var t = setTimeout(function(){ e.preventDefault(); openDocMenu(e); }, 500);
      zone._longPress = t;
    });
    zone.addEventListener('touchmove', function(){ clearTimeout(zone._longPress); });
    zone.addEventListener('touchend', function(){ clearTimeout(zone._longPress); });

    zone.addEventListener('contextmenu', function(e){
      e.preventDefault(); e.stopPropagation(); openDocMenu(e);
    });

    function openDocMenu(e){
      closeDocMenu();
      var clientX = e.clientX || (e.touches && e.touches[0].clientX) || 0;
      var clientY = e.clientY || (e.touches && e.touches[0].clientY) || 0;
      docCtxMenu.style.left = Math.min(clientX, window.innerWidth-190) + 'px';
      docCtxMenu.style.top = Math.min(clientY, window.innerHeight-160) + 'px';

      var items = [];
      var defs = [
        ['C', '复制 原文', function(){
          navigator.clipboard && navigator.clipboard.writeText(demoText.textContent).catch(function(){});
          demoFeedback.textContent = '> 已复制原文';
          setTimeout(function(){ demoFeedback.textContent = ''; }, 1200);
          closeDocMenu();
        }],
        ['R', '撤回 / 坍缩', function(){
          if (demoText.textContent !== '<< 此信息已坍缩 >>') {
            demoText.textContent = '<< 此信息已坍缩 >>';
            demoText.style.color = 'var(--collapsed, #2F4F4F)';
            demoFeedback.textContent = '> 信息已坍缩';
          } else {
            demoFeedback.textContent = '> 已处于坍缩态';
          }
          setTimeout(function(){ if (demoFeedback.textContent !== '') { demoFeedback.textContent = ''; } }, 1200);
          closeDocMenu();
        }],
        ['Q', '引用 / 锚定', function(){
          demoFeedback.textContent = '> 引用已锚定';
          setTimeout(function(){ demoFeedback.textContent = ''; }, 1200);
          closeDocMenu();
        }]
      ];

      defs.forEach(function(d){
        var it = document.createElement('div');
        it.className = 'doc-ctx-item';
        var l = document.createElement('span'); l.textContent = d[1];
        var k = document.createElement('span'); k.className='doc-ctx-key'; k.textContent='['+d[0]+']';
        it.appendChild(l); it.appendChild(k);
        it.addEventListener('click', d[2]);
        docCtxMenu.appendChild(it);
        items.push(it);
      });

      docCtxMenu.classList.add('open');
      items.forEach(function(el, i){ setTimeout(function(){ el.classList.add('reveal'); }, i*18); });
    }
  })();

  function openDocOverlay(){
    docOverlay.classList.add('open');
    drawDocSeal(docSealInput.value || 'ECHO_0');
  }
  function closeDocOverlay(){
    docOverlay.classList.remove('open');
    var docMenu = document.getElementById('doc-ctx-menu');
    if (docMenu.classList.contains('open')) {
      docMenu.classList.remove('open'); docMenu.classList.remove('closing'); docMenu.innerHTML = '';
    }
  }
  docToggleBtn.addEventListener('click', openDocOverlay);
  docCloseBtn.addEventListener('click', closeDocOverlay);
  docOverlay.addEventListener('click', function(e){
    if (e.target === docOverlay) closeDocOverlay();
  });
  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape' && docOverlay.classList.contains('open')) closeDocOverlay();
  });

  // ==========================================================
  // 子模块 15.20：启动流程 (修复自动唤醒bug)
  // ==========================================================
  var bootScreen = document.getElementById('boot-screen');
  var authScreen = document.getElementById('auth-screen');
  var appEl = document.getElementById('app');
  var dateBarEl = document.getElementById('date-bar');
  var inputAreaEl = document.getElementById('input-area');

  function wake(){
    Sound.play('boot');
    bootScreen.classList.add('hidden');
    setTimeout(function(){ bootScreen.style.display = 'none'; }, 900);

    var sess = Storage.getSession();
    if (sess && Storage.getUsers()[sess.callsign]){
      enterApp(sess.callsign);
    } else {
      Storage.clearSession();
      authScreen.classList.add('visible');
      document.getElementById('auth-callsign').focus();
    }
  }

  function enterApp(callsign){
    State.setSession(callsign);
    State.setViewing(callsign);
    authScreen.classList.remove('visible');
    appEl.classList.add('visible');

    document.getElementById('identity-name').textContent = callsign;
    drawSeal(document.getElementById('identity-seal'), callsign);

    setTimeout(function(){ dateBarEl.classList.add('shown'); }, 200);
    setTimeout(function(){ inputAreaEl.classList.add('shown'); echoInput.focus(); }, 500);

    State.loadTimeline(callsign);
    Render.renderAll();
    refreshFriendBadge();

    var draft = Storage.loadDraft();
    if (draft) {
      echoInput.value = draft;
      Render.autoGrow();
    }

    var theme = localStorage.getItem('Echo0_Theme');
    if (theme && theme !== 'default') {
      document.body.className = 'theme-' + theme;
    }

    // 自动草稿保存
    setInterval(function(){ Storage.saveDraft(echoInput.value); }, 3000);
  }

  // 认证表单
  document.getElementById('auth-form').addEventListener('submit', function(e){
    e.preventDefault();
    var callsign = document.getElementById('auth-callsign').value.trim();
    var password = document.getElementById('auth-password').value;
    var errEl = document.getElementById('auth-error');
    errEl.textContent = '';

    if (!validCallsign(callsign)){
      errEl.textContent = '>> 频率代号需为 2~16 位字母/数字/下划线/汉字';
      return;
    }
    if (password.length < 4){
      errEl.textContent = '>> 共振密钥至少 4 位';
      return;
    }

    var users = Storage.getUsers();
    var authMode = document.querySelector('.auth-tab.active').dataset.mode;

    if (authMode === 'register'){
      if (users[callsign]){ errEl.textContent = '>> 该频率已被占用'; return; }
      var salt = randomSalt();
      users[callsign] = { salt: salt, hash: hashPassword(password, salt), createdAt: new Date().toISOString() };
      Storage.saveUsers(users);
      Storage.saveTimeline(callsign, []);
      Storage.saveFriends(callsign, {accepted:[], incoming:[], outgoing:[]});
      Storage.setSession(callsign);
      document.getElementById('auth-callsign').value = '';
      document.getElementById('auth-password').value = '';
      enterApp(callsign);
    } else {
      var u = users[callsign];
      if (!u || hashPassword(password, u.salt) !== u.hash){
        errEl.textContent = '>> 频率不存在或密钥不匹配';
        return;
      }
      Storage.setSession(callsign);
      document.getElementById('auth-callsign').value = '';
      document.getElementById('auth-password').value = '';
      enterApp(callsign);
    }
  });

  document.getElementById('logout-btn').addEventListener('click', function(){
    Storage.clearSession();
    location.reload();
  });

  // ----- 唤醒监听：只靠用户按键/点击，无自动唤醒 -----
  window.addEventListener('keydown', function(){
    if (bootScreen.style.display !== 'none') wake();
  });
  bootScreen.addEventListener('click', wake);

  // ----- 字体检测 -----
  (function checkFont(){
    try{
      var c = document.createElement('canvas').getContext('2d');
      c.font = '16px monospace';
      var w1 = c.measureText('mmmmmmmmmm').width;
      c.font = '16px serif';
      var w2 = c.measureText('mmmmmmmmmm').width;
      if (Math.abs(w1 - w2) < 0.5) {
        document.getElementById('font-missing').classList.add('show');
      }
    }catch(e){}
  })();

  // 暴露全局
  window.Echo0 = {
    Storage: Storage,
    State: State,
    Render: Render,
    Sound: Sound,
    Particles: Particles,
    Commands: Commands,
    handleCommand: handleCommand,
    exportUniverse: exportUniverse,
    importUniverse: importUniverse,
    showAnalytics: showAnalytics,
    showCalendar: showCalendar,
    showSysDiagnostics: showSysDiagnostics
  };

})();
