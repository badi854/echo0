<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Echo 0 [独立宇宙]</title>
<style>
  /* ============================================================
     模块 1：全局变量 & 主题
     ============================================================ */
  :root{
    --bg-base:#0A0A0A;
    --bg-alt:#0F0F0F;
    --text-main:#C5C5C5;
    --accent:#1F4F4F;
    --accent-glow:rgba(31,79,79,0.3);
    --muted:#5A5A5A;
    --collapsed:#2F4F4F;
    --danger:#7a4a4a;
    --mono:'Courier New', monospace;
    --font-size-base:14px;
    --line-height-base:1.8em;
    --highlight-bg:#1F3F3F;
  }
  body.theme-amber{
    --bg-base:#1A140E;
    --bg-alt:#221B14;
    --text-main:#C5A57B;
    --accent:#8B6B4B;
    --accent-glow:rgba(139,107,75,0.3);
    --muted:#7A6A5A;
    --collapsed:#6B5B4B;
    --danger:#8B5B4B;
    --highlight-bg:#3F2F1F;
  }
  body.theme-green{
    --bg-base:#0E1A0E;
    --bg-alt:#142014;
    --text-main:#7BC57B;
    --accent:#3B7B3B;
    --accent-glow:rgba(59,123,59,0.3);
    --muted:#4A6A4A;
    --collapsed:#3A5A3A;
    --danger:#6A4A4A;
    --highlight-bg:#1F3F1F;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    background:var(--bg-base);
    color:var(--text-main);
    font-family:var(--mono);
    height:100%;
    overflow:hidden;
    font-size:var(--font-size-base);
    line-height:var(--line-height-base);
    -webkit-text-size-adjust:100%;
    transition:background 0.8s cubic-bezier(0.6,0.0,0.4,1.0), color 0.8s cubic-bezier(0.6,0.0,0.4,1.0);
  }
  button{
    font-family:var(--mono);
    background:transparent;
    border:none;
    color:var(--text-main);
    cursor:pointer;
    touch-action:manipulation;
  }

  /* ============================================================
     模块 2：背景画布
     ============================================================ */
  #bg-canvas{
    position:fixed;inset:0;width:100%;height:100%;z-index:0;
    pointer-events:none;
    transition:opacity 2s ease;
  }

  /* ============================================================
     模块 3：启动画面 & CRT 动效
     ============================================================ */
  #boot-screen{
    position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    z-index:60;background:var(--bg-base);
    padding:20px;
    animation: crt-boot 2.2s ease forwards;
  }
  @keyframes crt-boot {
    0%   { background: #1a1a1a; opacity:0; }
    5%   { background: #f0f0ee; opacity:0.9; }
    10%  { background: var(--bg-base); opacity:1; }
    100% { opacity:1; }
  }
  #boot-screen span{
    font-size:clamp(12px, 3vw, 14px);
    color:var(--muted);
    letter-spacing:0.15em;
    text-align:center;
    opacity:0;
    animation: boot-text-fade 1.2s 0.8s ease forwards;
  }
  @keyframes boot-text-fade {
    0%   { opacity:0; transform:translateY(4px); letter-spacing:0.3em; }
    100% { opacity:1; transform:translateY(0); letter-spacing:0.15em; }
  }
  #boot-cursor{
    display:inline-block;
    width:8px;height:1.2em;
    background:var(--text-main);
    margin-left:6px;
    vertical-align:-2px;
    animation: cursor-blink 0.9s steps(1) infinite;
  }
  @keyframes cursor-blink {
    0%, 50% { opacity:1; }
    50.01%, 100% { opacity:0; }
  }
  #boot-screen.hidden{
    animation: crt-shutdown 0.9s cubic-bezier(0.8,0.0,0.2,1.0) forwards;
  }
  @keyframes crt-shutdown {
    0%   { opacity:1; transform:scale(1); filter:brightness(1); }
    40%  { opacity:1; transform:scale(1.02); filter:brightness(1.6); }
    70%  { opacity:1; transform:scale(0.98); filter:brightness(0.3); }
    100% { opacity:0; transform:scale(0.96); filter:brightness(0); }
  }

  /* ============================================================
     模块 4：认证页
     ============================================================ */
  #auth-screen{
    position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    z-index:55;background:var(--bg-base);
    opacity:0;transition:opacity 0.7s ease, background 0.6s ease;
    padding:20px;
  }
  #auth-screen.visible{display:flex;opacity:1;animation:auth-rise 0.9s cubic-bezier(0.22,1,0.36,1) forwards;}
  @keyframes auth-rise {
    0%   { opacity:0; transform:translateY(12px) scale(0.98); }
    100% { opacity:1; transform:translateY(0) scale(1); }
  }
  #auth-panel{width:100%;max-width:400px;}
  #auth-tabs{
    display:flex;gap:0;margin-bottom:26px;
    font-size:clamp(11px, 2.5vw, 12px);letter-spacing:0.1em;
  }
  .auth-tab{
    padding:6px 0;margin-right:24px;
    color:var(--muted);cursor:pointer;
    border-bottom:1px solid transparent;
    touch-action:manipulation;
    transition:color 0.3s ease, border-color 0.3s ease;
  }
  .auth-tab.active{color:var(--text-main);border-bottom-color:var(--accent);}
  .auth-field{margin-bottom:22px;}
  .auth-label{
    display:block;font-size:clamp(10px, 2vw, 11px);
    color:var(--muted);letter-spacing:0.1em;margin-bottom:8px;
  }
  .auth-input{
    width:100%;background:transparent;border:none;outline:none;
    border-bottom:1px solid var(--accent);color:var(--text-main);
    font-family:var(--mono);font-size:clamp(14px, 3.5vw, 16px);
    padding:8px 2px;
    transition:border-color 0.4s ease, box-shadow 0.4s ease;
  }
  .auth-input:focus{
    border-bottom-color:var(--accent);
    box-shadow:0 6px 10px -6px var(--accent-glow);
  }
  #auth-submit{
    margin-top:6px;font-size:clamp(11px, 2.5vw, 12px);
    color:var(--text-main);letter-spacing:0.08em;
    border-bottom:1px solid var(--accent);padding-bottom:6px;
    transition:color 0.3s ease, transform 0.15s ease;
  }
  #auth-submit:hover{color:#dfe;}
  #auth-submit:active{transform:scale(0.96);}
  #auth-error{min-height:16px;margin-top:16px;font-size:clamp(10px, 2vw, 11px);color:var(--danger);letter-spacing:0.04em;}
  #auth-hint{margin-top:34px;font-size:clamp(9px, 1.8vw, 10px);color:var(--muted);letter-spacing:0.05em;line-height:1.6em;}

  /* ============================================================
     模块 5：主界面布局
     ============================================================ */
  #app{
    position:relative;z-index:1;height:100%;display:flex;flex-direction:column;
    opacity:0;transition:opacity 1.4s cubic-bezier(0.22,1,0.36,1);
  }
  #app.visible{opacity:1;}

  #date-bar{
    flex:0 0 auto;padding:12px 16px 8px 16px;
    font-size:clamp(10px, 2vw, 11px);color:var(--muted);
    letter-spacing:0.1em;
    opacity:0;transform:translateY(-8px);
    transition:opacity 0.9s cubic-bezier(0.22,1,0.36,1),
                transform 0.9s cubic-bezier(0.22,1,0.36,1),
                color 0.6s ease;
    display:flex;align-items:center;justify-content:space-between;
    flex-wrap:wrap;
  }
  #date-bar.shown{opacity:1;transform:translateY(0);}
  #identity-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  #identity-seal-wrap{display:flex;align-items:center;gap:4px;transition:transform 0.3s ease;}
  #identity-seal-wrap:hover{transform:rotate(-6deg) scale(1.05);}
  #identity-label{color:var(--muted);font-size:clamp(9px, 1.8vw, 11px);}
  #identity-label b{color:var(--text-main);font-weight:normal;}
  #friends-toggle-btn{
    width:24px;height:24px;display:flex;align-items:center;justify-content:center;
    opacity:0.8;touch-action:manipulation;
    transition:opacity 0.3s ease, transform 0.2s ease;
  }
  #friends-toggle-btn:hover{opacity:1;transform:scale(1.1);}
  #doc-toggle-btn{
    color:var(--muted);cursor:pointer;
    font-size:clamp(9px, 1.8vw, 10px);letter-spacing:0.06em;
    touch-action:manipulation;
    transition:color 0.3s ease, transform 0.2s ease;
  }
  #doc-toggle-btn:hover{color:var(--text-main);transform:translateY(-1px);}
  #logout-btn{
    color:var(--muted);cursor:pointer;
    font-size:clamp(9px, 1.8vw, 10px);letter-spacing:0.06em;
    touch-action:manipulation;
    transition:color 0.3s ease, transform 0.2s ease;
  }
  #logout-btn:hover{color:var(--danger);transform:scale(0.96);}
  #badge-dot{
    width:6px;height:6px;border-radius:50%;background:var(--danger);
    position:absolute;top:-2px;right:-2px;display:none;
    animation:badge-pulse 2s ease-in-out infinite;
  }
  @keyframes badge-pulse {
    0%, 100% { opacity:1; transform:scale(1); }
    50% { opacity:0.4; transform:scale(0.85); }
  }
  #badge-dot.show{display:inline-block;}

  /* 好友查看横幅 */
  #friend-view-banner{
    display:none;flex:0 0 auto;padding:8px 16px;
    font-size:clamp(10px, 2vw, 11px);
    color:var(--muted);border-bottom:1px solid #1a2a2a;letter-spacing:0.05em;
    justify-content:space-between;flex-wrap:wrap;
    animation:banner-slide 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  @keyframes banner-slide {
    0% { opacity:0; transform:translateY(-8px); }
    100% { opacity:1; transform:translateY(0); }
  }
  #friend-view-banner.show{display:flex;}
  #fv-back{color:var(--accent);cursor:pointer;touch-action:manipulation;transition:color 0.3s ease, transform 0.2s ease;}
  #fv-back:hover{color:var(--text-main);transform:translateX(-2px);}
  #fv-name{color:var(--text-main);}

  /* ============================================================
     模块 6：时间线 & 消息
     ============================================================ */
  #timeline-wrap{
    flex:1 1 auto;overflow-y:auto;padding:6px 16px 16px 16px;
    position:relative;
    -webkit-overflow-scrolling:touch;
    scroll-behavior:smooth;
  }
  #timeline-wrap::-webkit-scrollbar{width:4px;}
  #timeline-wrap::-webkit-scrollbar-thumb{background:var(--accent);}
  #timeline-wrap::-webkit-scrollbar-track{background:transparent;}

  #empty-state{
    position:absolute;top:50%;left:0;right:0;text-align:center;
    transform:translateY(-50%);
    color:var(--muted);
    font-size:clamp(12px, 3vw, 14px);
    letter-spacing:0.08em;
    pointer-events:none;
    padding:0 16px;
    transition:opacity 0.7s ease, transform 0.7s ease;
  }
  #empty-state.fade-out{
    opacity:0;
    transform:translateY(-40%) scale(0.96);
  }
  #empty-state.fade-in{
    opacity:1;
    transform:translateY(-50%) scale(1);
  }

  .msg-row{
    display:flex;align-items:flex-start;gap:10px;
    padding:4px 0;margin-bottom:1.8em;
    opacity:0;
    transform:translateY(12px) scale(0.98);
    transition:opacity 0.55s cubic-bezier(0.22,1,0.36,1),
                transform 0.55s cubic-bezier(0.22,1,0.36,1),
                background 0.6s ease;
  }
  .msg-row.entered{
    opacity:1;
    transform:translateY(0) scale(1);
  }
  .msg-row.ripple{
    animation:ripple-out 0.9s ease forwards;
  }
  @keyframes ripple-out {
    0% { box-shadow: 0 0 0 0 rgba(31,79,79,0.4), 0 0 0 0 rgba(31,79,79,0.1); }
    100% { box-shadow: 0 0 0 20px transparent, 0 0 0 40px transparent; }
  }
  .msg-row.pinned{
    border-left:2px solid var(--accent);
    padding-left:8px;
    background:linear-gradient(90deg, rgba(31,79,79,0.08) 0%, transparent 60%);
  }

  /* ---- 终端打字机光标 (新增) ---- */
  .typing-cursor{
    display:inline-block;
    width:6px;
    height:1.1em;
    background:var(--accent);
    margin-left:2px;
    vertical-align:-2px;
    animation: cursor-blink 0.5s steps(1) infinite;
  }

  .msg-id{
    flex:0 0 auto;color:var(--muted);
    font-size:clamp(10px, 2vw, 12px);
    width:clamp(44px, 12vw, 64px);
    padding-top:2px;user-select:none;
  }
  .msg-id .pin-star{
    color:var(--accent);
    margin-right:2px;
    font-size:clamp(8px, 1.8vw, 10px);
    animation:pin-glow 2s ease-in-out infinite;
  }
  @keyframes pin-glow {
    0%, 100% { opacity:1; transform:scale(1); }
    50% { opacity:0.6; transform:scale(1.1); }
  }
  .msg-body{
    flex:1 1 auto;min-width:0;
    white-space:pre-wrap;word-break:break-word;
    user-select:none;
    font-size:clamp(13px, 3.2vw, 15px);
  }
  /* ---- 文本格式支持 (新增) ---- */
  .msg-body b{color:var(--text-main);font-weight:bold;}
  .msg-body i{color:var(--text-main);font-style:italic;}
  .msg-body s{color:var(--muted);text-decoration:line-through;}

  .msg-body .highlight{
    background:var(--highlight-bg);
    padding:0 4px;
    animation:highlight-flash 1.2s ease;
  }
  @keyframes highlight-flash {
    0% { background:var(--accent); color:var(--bg-base); }
    100% { background:var(--highlight-bg); color:var(--text-main); }
  }
  .msg-body .tag-entity{
    color:var(--accent);
    cursor:pointer;
    transition:color 0.25s ease, transform 0.2s ease;
    display:inline-block;
  }
  .msg-body .tag-entity::before{content:'#';}
  .msg-body .tag-entity:hover{
    color:var(--text-main);
    transform:translateY(-1px);
  }
  .msg-body.collapsed-text{
    color:var(--muted);
    letter-spacing:0.05em;
  }
  .msg-collapsed-note{
    display:block;margin-top:4px;
    color:var(--collapsed);
    font-size:clamp(9px, 2vw, 11px);letter-spacing:0.04em;
    user-select:none;
    animation:collapse-appear 0.7s ease forwards;
  }
  @keyframes collapse-appear {
    0% { opacity:0; transform:translateY(-4px); letter-spacing:0.2em; }
    100% { opacity:1; transform:translateY(0); letter-spacing:0.04em; }
  }
  .msg-edited-tag{
    color:var(--muted);
    font-size:clamp(9px, 2vw, 11px);
    margin-left:6px;user-select:none;
    opacity:0.7;
  }
  .msg-print{
    flex:0 0 auto;width:18px;height:18px;
    opacity:0.8;
    transition:opacity 0.3s ease, transform 0.3s ease;
  }
  .msg-row:hover .msg-print{
    opacity:1;
    transform:rotate(8deg) scale(1.05);
  }

  /* ============================================================
     模块 7：输入区域 & 命令联想
     ============================================================ */
  #input-area{
    flex:0 0 auto;position:relative;
    padding:12px 16px 16px 16px;
    opacity:0;transition:opacity 1s ease;
  }
  #input-area.shown{opacity:1;}
  #quote-bar{
    display:none;height:1px;background:var(--accent);
    margin-bottom:8px;opacity:0.6;
    transform-origin:left;
    animation:quote-expand 0.4s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  @keyframes quote-expand {
    0% { transform:scaleX(0); opacity:0; }
    100% { transform:scaleX(1); opacity:0.6; }
  }
  #quote-bar.active{display:block;}
  #echo-input{
    width:100%;background:transparent;border:none;outline:none;
    border-bottom:1px solid var(--accent);
    color:var(--text-main);
    font-family:var(--mono);
    font-size:clamp(14px, 3.5vw, 16px);
    padding:8px 2px;resize:none;overflow:hidden;
    line-height:1.8em;caret-color:var(--text-main);
    transition:border-color 0.5s ease, box-shadow 0.5s ease, padding 0.3s ease;
    -webkit-appearance:none;
  }
  #echo-input:focus{
    border-bottom-color:var(--accent);
    box-shadow:0 6px 10px -6px var(--accent-glow);
    padding-bottom:10px;
  }
  #echo-input.focused{
    animation:input-power 0.8s ease;
  }
  @keyframes input-power {
    0% { border-bottom-color:var(--text-main); box-shadow:0 0 12px var(--accent-glow); }
    50% { border-bottom-color:var(--text-main); box-shadow:0 0 24px var(--accent-glow); }
    100% { border-bottom-color:var(--accent); box-shadow:0 6px 10px -6px var(--accent-glow); }
  }

  #copied-flag{
    position:absolute;right:16px;bottom:48px;
    font-size:clamp(10px, 2vw, 11px);color:var(--muted);
    opacity:0;pointer-events:none;
    transition:opacity 0.3s ease, transform 0.3s ease;
  }
  #copied-flag.show{opacity:1;transform:translateY(-4px);}
  #cmd-feedback{
    position:absolute;left:16px;bottom:48px;
    font-size:clamp(10px, 2vw, 11px);color:var(--collapsed);
    opacity:0;pointer-events:none;
    transition:opacity 0.4s ease, transform 0.4s ease;
  }
  #cmd-feedback.show{opacity:1;transform:translateY(-4px);}
  #input-ripple{
    position:absolute;bottom:44px;left:50%;
    width:4px;height:4px;
    border-radius:50%;
    background:var(--accent);
    transform:translateX(-50%) scale(0);
    opacity:0;
    pointer-events:none;
  }
  #input-ripple.animate{
    animation:input-ripple-out 0.9s ease-out forwards;
  }
  @keyframes input-ripple-out {
    0% { transform:translateX(-50%) scale(1); opacity:0.7; }
    100% { transform:translateX(-50%) scale(40); opacity:0; }
  }

  /* 命令联想 */
  #cmd-autocomplete{
    position:absolute;left:16px;bottom:100%;
    width:calc(100% - 32px);
    max-height:200px;overflow-y:auto;
    background:var(--bg-base);border:1px solid var(--accent);
    display:none;z-index:50;
    font-size:clamp(12px, 2.8vw, 14px);
    margin-bottom:4px;
    box-shadow:0 8px 24px rgba(0,0,0,0.6);
    transform-origin:bottom;
    animation:ac-expand 0.2s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  @keyframes ac-expand {
    0% { transform:scaleY(0.7); opacity:0; }
    100% { transform:scaleY(1); opacity:1; }
  }
  #cmd-autocomplete.open{display:block;}
  #cmd-autocomplete::-webkit-scrollbar{width:4px;}
  #cmd-autocomplete::-webkit-scrollbar-thumb{background:var(--accent);}
  #cmd-autocomplete::-webkit-scrollbar-track{background:transparent;}
  .ac-item{
    padding:8px 12px;display:flex;justify-content:space-between;align-items:center;
    cursor:pointer;color:var(--text-main);
    border-bottom:1px solid rgba(31,79,79,0.3);
    touch-action:manipulation;
    min-height:36px;
    transition:background 0.15s ease;
  }
  .ac-item:last-child{border-bottom:none;}
  .ac-item:hover{background:var(--bg-alt);}
  .ac-item.active{background:var(--bg-alt);}
  .ac-item .ac-cmd{color:var(--text-main);}
  .ac-item .ac-desc{color:var(--muted);font-size:clamp(9px, 2vw, 10px);margin-left:12px;flex-shrink:0;}

  /* ============================================================
     模块 8：统计 & 日历 Overlay
     ============================================================ */
  #stats-overlay, #cal-overlay{
    position:fixed;inset:0;display:none;z-index:91;
    background:rgba(10,10,10,0.78);
    padding:30px;
    align-items:center;justify-content:center;
    animation:overlay-fade 0.5s ease forwards;
  }
  @keyframes overlay-fade {
    0% { opacity:0; backdrop-filter:blur(0px); }
    100% { opacity:1; backdrop-filter:blur(4px); }
  }
  #stats-overlay.show, #cal-overlay.show{display:flex;}
  #stats-box, #cal-box{
    background:var(--bg-base);
    border:1px solid var(--accent);
    padding:30px 28px;
    max-width:480px;width:100%;
    max-height:80vh;overflow-y:auto;
    animation:box-rise 0.6s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  @keyframes box-rise {
    0% { opacity:0; transform:translateY(20px) scale(0.96); }
    100% { opacity:1; transform:translateY(0) scale(1); }
  }
  #stats-box .s-title{
    font-size:clamp(12px, 2.5vw, 14px);
    color:var(--muted);letter-spacing:0.1em;
    margin-bottom:20px;border-bottom:1px solid var(--accent);
    padding-bottom:12px;
  }
  #stats-box .s-row{
    display:flex;justify-content:space-between;
    padding:6px 0;
    font-size:clamp(12px, 2.8vw, 14px);
    border-bottom:1px solid rgba(31,79,79,0.2);
    opacity:0;
    animation:stats-row-in 0.4s ease forwards;
  }
  #stats-box .s-row:nth-child(2){animation-delay:0.05s;}
  #stats-box .s-row:nth-child(3){animation-delay:0.10s;}
  #stats-box .s-row:nth-child(4){animation-delay:0.15s;}
  #stats-box .s-row:nth-child(5){animation-delay:0.20s;}
  #stats-box .s-row:nth-child(6){animation-delay:0.25s;}
  #stats-box .s-row:nth-child(7){animation-delay:0.30s;}
  #stats-box .s-row:nth-child(8){animation-delay:0.35s;}
  #stats-box .s-row:nth-child(9){animation-delay:0.40s;}
  @keyframes stats-row-in {
    0% { opacity:0; transform:translateX(-6px); }
    100% { opacity:1; transform:translateX(0); }
  }
  #stats-box .s-row .s-label{color:var(--muted);}
  #stats-box .s-row .s-value{color:var(--text-main);}
  .stat-digit{display:inline-block;transition:transform 0.15s ease;}
  .stat-digit.pop{animation:digit-pop 0.25s cubic-bezier(0.34,1.56,0.64,1) forwards;}
  @keyframes digit-pop {
    0% { transform:scale(0.8); opacity:0.5; }
    100% { transform:scale(1); opacity:1; }
  }
  #stats-box .s-close, #cal-box .c-close{
    margin-top:18px;
    font-size:clamp(10px, 2vw, 11px);
    color:var(--muted);cursor:pointer;text-align:center;
    transition:color 0.3s ease, transform 0.2s ease;
  }
  #stats-box .s-close:hover, #cal-box .c-close:hover{
    color:var(--text-main);
    transform:scale(0.96);
  }

  /* 日历网格 */
  #cal-box .c-title{
    font-size:clamp(11px, 2.5vw, 13px);
    color:var(--muted);letter-spacing:0.1em;
    margin-bottom:16px;border-bottom:1px solid var(--accent);
    padding-bottom:10px;
  }
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cal-cell{
    aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;
    font-size:clamp(10px, 2vw, 12px);color:var(--muted);cursor:pointer;
    border:1px solid transparent;transition:border 0.2s ease, background 0.2s ease, transform 0.15s ease;
  }
  .cal-cell.has-msg{
    color:var(--text-main);
    border-color:var(--accent);
  }
  .cal-cell.has-msg:hover{
    background:var(--bg-alt);
    transform:scale(1.08);
  }
  .cal-cell .cnt{font-size:clamp(7px, 1.4vw, 9px);color:var(--muted);margin-left:2px;}
  .cal-cell.empty{color:#2a2a2a;}

  /* ============================================================
     模块 9：右键菜单
     ============================================================ */
  #ctx-menu{
    position:fixed;min-width:160px;max-width:90vw;
    background:var(--bg-base);
    border:1px solid var(--accent);
    z-index:100;
    display:none;
    font-size:clamp(12px, 2.8vw, 14px);
    overflow:hidden;
    box-shadow:0 0 40px rgba(0,0,0,0.8), 0 0 8px var(--accent-glow);
  }
  #ctx-menu::before{
    content:'';
    position:absolute;inset:-2px;
    background:radial-gradient(ellipse at var(--mx,50%) var(--my,50%),
                rgba(31,79,79,0.15) 0%, transparent 70%);
    pointer-events:none;
    opacity:0;
    transition:opacity 0.4s ease;
  }
  #ctx-menu.open::before{opacity:1;}
  #ctx-menu.open{display:block;}
  #ctx-menu.closing{
    animation:crt-close 0.35s cubic-bezier(0.8,0.0,0.2,1.0) forwards;
  }
  @keyframes crt-close {
    0%   { transform:scaleY(1); opacity:1; filter:brightness(1); }
    40%  { transform:scaleY(0.02); opacity:1; filter:brightness(1.6); }
    70%  { transform:scaleY(0.01); opacity:0.6; filter:brightness(0.3); }
    100% { transform:scaleY(0.01); opacity:0; filter:brightness(0); }
  }
  .ctx-item{
    padding:12px 16px;color:var(--text-main);cursor:pointer;
    opacity:0;
    display:flex;justify-content:space-between;white-space:nowrap;
    touch-action:manipulation;
    min-height:44px;
    transition:background 0.15s ease, color 0.2s ease;
    position:relative;
  }
  .ctx-item.reveal{animation:ctx-typein 0.16s cubic-bezier(0.22,1,0.36,1) forwards;}
  @keyframes ctx-typein {
    0% { opacity:0; transform:translateX(-6px); letter-spacing:0.1em; }
    100% { opacity:1; transform:translateX(0); letter-spacing:0; }
  }
  .ctx-item:hover{background:var(--bg-alt);}
  .ctx-item::before{
    content:'';
    position:absolute;left:0;top:0;bottom:0;
    width:2px;
    background:var(--accent);
    transform:scaleY(0);
    transition:transform 0.2s cubic-bezier(0.22,1,0.36,1);
  }
  .ctx-item:hover::before{transform:scaleY(1);}
  .ctx-key{color:var(--muted);font-size:clamp(10px, 2vw, 11px);}
  .ctx-danger{color:var(--danger);}
  .ctx-confirm{
    padding:12px 16px;display:none;
    color:var(--muted);
    font-size:clamp(11px, 2.5vw, 12px);
    border-top:1px solid var(--accent);
    animation:confirm-fade 0.25s ease forwards;
  }
  @keyframes confirm-fade {
    0% { opacity:0; transform:translateY(-4px); }
    100% { opacity:1; transform:translateY(0); }
  }
  .ctx-confirm.show{display:flex;justify-content:space-between;}
  .ctx-confirm span.yes{color:var(--danger);cursor:pointer;touch-action:manipulation;transition:color 0.2s ease, transform 0.15s ease;}
  .ctx-confirm span.yes:hover{color:#aa5555;transform:scale(1.05);}
  .ctx-confirm span.no{color:var(--muted);cursor:pointer;touch-action:manipulation;transition:color 0.2s ease, transform 0.15s ease;}
  .ctx-confirm span.no:hover{color:var(--text-main);transform:scale(1.05);}

  /* ============================================================
     模块 10：系统诊断 Overlay
     ============================================================ */
  #sys-overlay{
    position:fixed;inset:0;display:none;
    align-items:center;justify-content:center;z-index:90;
    flex-direction:column;
    color:var(--collapsed);
    font-size:clamp(11px, 2.5vw, 12px);
    letter-spacing:0.06em;
    text-align:center;
    pointer-events:none;
    padding:20px;
    animation:sys-fade 0.6s ease forwards;
  }
  @keyframes sys-fade {
    0% { opacity:0; transform:scale(0.96); }
    100% { opacity:1; transform:scale(1); }
  }
  #sys-overlay.show{display:flex;}
  #sys-overlay div{
    margin:4px 0;
    opacity:0;
    animation:sys-line 0.3s ease forwards;
  }
  #sys-overlay div:nth-child(1){animation-delay:0.05s;}
  #sys-overlay div:nth-child(2){animation-delay:0.10s;}
  #sys-overlay div:nth-child(3){animation-delay:0.15s;}
  @keyframes sys-line {
    0% { opacity:0; transform:translateX(-8px); letter-spacing:0.2em; }
    100% { opacity:1; transform:translateX(0); letter-spacing:0.06em; }
  }

  /* ============================================================
     模块 11：好友面板
     ============================================================ */
  #friends-panel{
    position:fixed;top:0;right:0;bottom:0;
    width:85%;max-width:400px;
    background:var(--bg-base);
    border-left:1px solid var(--accent);
    z-index:80;
    transform:translateX(100%);
    transition:transform 0.45s cubic-bezier(0.22,1,0.36,1),
                background 0.6s ease;
    display:flex;flex-direction:column;
    box-shadow:-8px 0 40px rgba(0,0,0,0.6);
  }
  #friends-panel.open{transform:translateX(0);}
  #fp-header{
    padding:16px 18px 12px 18px;
    border-bottom:1px solid var(--accent);
    display:flex;justify-content:space-between;align-items:center;
    font-size:clamp(11px, 2.5vw, 12px);
    letter-spacing:0.1em;color:var(--muted);
  }
  #fp-close{color:var(--muted);cursor:pointer;font-size:clamp(18px, 4vw, 22px);touch-action:manipulation;transition:color 0.3s ease, transform 0.2s ease;}
  #fp-close:hover{color:var(--text-main);transform:rotate(90deg);}
  #fp-add{padding:14px 18px;border-bottom:1px solid var(--accent);}
  #fp-add-input{
    width:100%;background:transparent;border:none;outline:none;
    border-bottom:1px solid var(--accent);
    color:var(--text-main);
    font-family:var(--mono);
    font-size:clamp(13px, 3vw, 14px);
    padding:6px 2px;
    transition:border-color 0.3s ease, box-shadow 0.3s ease;
  }
  #fp-add-input:focus{
    border-bottom-color:var(--text-main);
    box-shadow:0 4px 8px -4px var(--accent-glow);
  }
  #fp-add-btn{
    margin-top:8px;
    font-size:clamp(10px, 2vw, 11px);
    color:var(--muted);letter-spacing:0.06em;
    cursor:pointer;touch-action:manipulation;
    transition:color 0.3s ease, transform 0.2s ease;
  }
  #fp-add-btn:hover{color:var(--text-main);transform:translateX(2px);}
  #fp-add-msg{margin-top:6px;font-size:clamp(9px, 2vw, 10px);color:var(--danger);min-height:12px;}
  #fp-body{flex:1 1 auto;overflow-y:auto;padding:6px 0;-webkit-overflow-scrolling:touch;}
  .fp-section-title{padding:12px 18px 4px 18px;font-size:clamp(9px, 2vw, 10px);color:var(--muted);letter-spacing:0.1em;}
  .fp-row{
    padding:10px 18px;display:flex;align-items:center;gap:10px;
    font-size:clamp(12px, 2.8vw, 13px);cursor:default;
    min-height:44px;
    transition:background 0.2s ease;
  }
  .fp-row.clickable{cursor:pointer;touch-action:manipulation;}
  .fp-row.clickable:hover{background:var(--bg-alt);}
  .fp-row canvas{transition:transform 0.3s ease;}
  .fp-row.clickable:hover canvas{transform:rotate(-6deg) scale(1.05);}
  .fp-name{flex:1 1 auto;color:var(--text-main);}
  .fp-note{font-size:clamp(9px, 2vw, 10px);color:var(--muted);}
  .fp-yn span{
    cursor:pointer;font-size:clamp(10px, 2vw, 11px);
    margin-left:8px;touch-action:manipulation;
    transition:color 0.2s ease, transform 0.15s ease;
  }
  .fp-yn .y{color:var(--danger);}
  .fp-yn .y:hover{color:#aa5555;transform:scale(1.1);}
  .fp-yn .n{color:var(--muted);}
  .fp-yn .n:hover{color:var(--text-main);transform:scale(1.1);}
  .fp-cancel{font-size:clamp(9px, 2vw, 10px);color:var(--muted);cursor:pointer;touch-action:manipulation;transition:color 0.2s ease, transform 0.15s ease;}
  .fp-cancel:hover{color:var(--danger);transform:scale(0.95);}
  .fp-empty{padding:10px 18px;font-size:clamp(10px, 2vw, 11px);color:var(--muted);}
  #fp-footer{
    padding:12px 18px;
    font-size:clamp(8px, 1.6vw, 9px);
    color:var(--muted);letter-spacing:0.04em;
    line-height:1.6em;border-top:1px solid var(--accent);
  }

  /* ============================================================
     模块 12：设计文档 Overlay
     ============================================================ */
  #doc-overlay{
    position:fixed;inset:0;z-index:150;
    display:none;align-items:center;justify-content:center;
    background:rgba(10,10,10,0.88);backdrop-filter:blur(2px);
    padding:10px;
    animation:doc-overlay-in 0.5s ease forwards;
  }
  @keyframes doc-overlay-in {
    0% { opacity:0; backdrop-filter:blur(0px); }
    100% { opacity:1; backdrop-filter:blur(2px); }
  }
  #doc-overlay.open{display:flex;}
  #doc-container{
    position:relative;width:100%;max-width:840px;height:100%;max-height:800px;
    background:var(--bg-base);border:1px solid var(--accent);
    overflow:hidden;display:flex;flex-direction:column;
    border-radius:0;
    animation:doc-box-in 0.6s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  @keyframes doc-box-in {
    0% { opacity:0; transform:translateY(20px) scale(0.96); }
    100% { opacity:1; transform:translateY(0) scale(1); }
  }
  #doc-close-btn{
    position:absolute;top:10px;right:16px;
    font-size:clamp(22px, 5vw, 28px);color:var(--muted);
    cursor:pointer;z-index:10;line-height:1;
    touch-action:manipulation;
    transition:color 0.3s ease, transform 0.2s ease;
  }
  #doc-close-btn:hover{color:var(--text-main);transform:rotate(90deg);}
  #doc-scroll{
    flex:1 1 auto;overflow-y:auto;
    padding:50px 20px 60px 20px;
    -webkit-overflow-scrolling:touch;
  }
  #doc-scroll::-webkit-scrollbar{width:4px;}
  #doc-scroll::-webkit-scrollbar-thumb{background:var(--accent);}
  #doc-scroll::-webkit-scrollbar-track{background:transparent;}

  /* 设计文档内部样式（精简） */
  .doc-body{font-size:clamp(13px, 3vw, 15px);line-height:1.8em;letter-spacing:0.02em;}
  .doc-body .cover{margin-bottom:80px;}
  .doc-body .cover .eyebrow{font-size:clamp(10px, 2vw, 11px);letter-spacing:0.25em;margin-bottom:20px;color:var(--muted);}
  .doc-body .cover h1{font-size:clamp(28px, 6vw, 36px);font-weight:normal;letter-spacing:0.06em;margin-bottom:4px;color:var(--text-main);}
  .doc-body .cover .cn{font-size:clamp(13px, 2.8vw, 16px);letter-spacing:0.3em;margin-bottom:24px;color:var(--muted);}
  .doc-body .cover .thesis{font-size:clamp(13px, 3vw, 15px);max-width:100%;line-height:2em;margin-bottom:30px;color:var(--text-main);}
  .doc-body .cover .tags{display:flex;flex-wrap:wrap;gap:8px;}
  .doc-body .tag{border:1px solid var(--accent);color:var(--muted);padding:4px 10px;font-size:clamp(9px, 2vw, 11px);}
  .doc-body .toc{margin-top:40px;font-size:clamp(11px, 2.5vw, 12px);color:var(--muted);}
  .doc-body .toc .n{color:var(--accent);margin-right:10px;}
  .doc-body section{margin-bottom:70px;}
  .doc-body .sec-index{font-size:clamp(10px, 2vw, 11px);color:var(--accent);letter-spacing:0.2em;margin-bottom:12px;}
  .doc-body h2{font-size:clamp(18px, 4vw, 22px);font-weight:normal;letter-spacing:0.05em;margin-bottom:6px;color:var(--text-main);}
  .doc-body h2 .en{font-size:clamp(10px, 2vw, 11px);color:var(--muted);margin-top:4px;}
  .doc-body .lede{color:var(--text-main);font-size:clamp(12px, 2.8vw, 14px);max-width:100%;margin:18px 0 30px 0;line-height:2em;}
  .doc-body hr.div{border-color:var(--accent);margin:70px 0 0 0;}
  .doc-body .body-text{max-width:100%;color:var(--text-main);font-size:clamp(12px, 2.8vw, 14px);line-height:2em;margin-bottom:14px;}
  .doc-body .body-text b{color:var(--text-main);font-weight:normal;}
  .doc-body .swatch-row{display:flex;gap:0;margin-bottom:30px;flex-wrap:wrap;}
  .doc-body .swatch{width:33.33%;padding:50px 0 10px 0;position:relative;border-right:1px solid var(--accent);}
  .doc-body .swatch:last-child{border-right:none;}
  .doc-body .swatch .name{font-size:clamp(10px, 2vw, 11px);color:var(--text-main);}
  .doc-body .swatch .hex{font-size:clamp(8px, 1.6vw, 10px);color:var(--muted);}
  .doc-body .swatch .role{font-size:clamp(7px, 1.4vw, 9px);color:var(--muted);}
  .doc-body .type-sample{border-left:1px solid var(--accent);padding-left:16px;margin:20px 0;}
  .doc-body .type-sample .row{margin-bottom:16px;}
  .doc-body .type-sample .label{font-size:clamp(9px, 2vw, 10px);color:var(--muted);}
  .doc-body .type-sample .demo{font-size:clamp(13px, 3vw, 15px);color:var(--text-main);}
  .doc-body .cursor-block{display:inline-block;width:7px;height:1.1em;background:var(--text-main);vertical-align:-2px;margin-left:4px;animation:cursor-blink 1s steps(1) infinite;}
  .doc-body .demo-card{border:1px solid var(--accent);padding:20px;margin:20px 0;}
  .doc-body .demo-card .cap{font-size:clamp(9px, 2vw, 10px);color:var(--muted);margin-top:10px;}
  .doc-body .fp-grid{gap:20px;flex-wrap:wrap;}
  .doc-body .fp-item canvas{width:28px;height:28px;}
  .doc-body .fp-item .len{font-size:clamp(8px, 1.6vw, 10px);color:var(--muted);}
  .doc-body .ctx-demo-zone{height:140px;border:1px dashed var(--accent);font-size:clamp(11px, 2.5vw, 12px);display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);cursor:context-menu;user-select:none;}
  .doc-body .ctx-demo-zone .demo-text{color:var(--text-main);font-size:clamp(12px, 2.8vw, 14px);min-height:1.6em;}
  .doc-body .ctx-demo-zone .demo-feedback{font-size:clamp(9px, 2vw, 10px);color:var(--muted);min-height:1.2em;}
  .doc-body .seal-generator{gap:20px;display:flex;align-items:center;flex-wrap:wrap;}
  .doc-body .seal-generator canvas{width:56px;height:56px;}
  .doc-body .seal-label{font-size:clamp(9px, 2vw, 10px);color:var(--muted);}
  .doc-body .seal-input{width:100%;background:transparent;border:none;outline:none;border-bottom:1px solid var(--accent);color:var(--text-main);font-family:var(--mono);font-size:clamp(14px, 3vw, 16px);padding:6px 2px;}
  .doc-body .seal-hint{font-size:clamp(9px, 2vw, 10px);color:var(--muted);}
  .doc-body .rule-list{border-top:1px solid var(--accent);}
  .doc-body .rule{padding:14px 0;border-bottom:1px solid var(--accent);display:flex;gap:14px;flex-wrap:wrap;}
  .doc-body .rule .num{color:var(--accent);font-size:clamp(11px, 2.5vw, 12px);flex:0 0 24px;}
  .doc-body .rule .txt{font-size:clamp(12px, 2.8vw, 14px);color:var(--text-main);line-height:1.9em;}
  .doc-body .rule .txt b{color:var(--text-main);font-weight:normal;}
  .doc-body .closing{color:var(--muted);font-size:clamp(12px, 2.8vw, 14px);line-height:2.2em;max-width:100%;}
  .doc-body .closing .sig{margin-top:30px;font-size:clamp(10px, 2vw, 11px);color:var(--muted);letter-spacing:0.1em;}

  /* 文档专用右键菜单 */
  #doc-ctx-menu{
    position:fixed;min-width:160px;max-width:90vw;
    background:var(--bg-base);border:1px solid var(--accent);
    z-index:160;display:none;
    font-size:clamp(12px, 2.8vw, 14px);overflow:hidden;
    box-shadow:0 0 40px rgba(0,0,0,0.8);
  }
  #doc-ctx-menu.open{display:block;}
  #doc-ctx-menu.closing{animation:crt-close 0.35s cubic-bezier(0.8,0.0,0.2,1.0) forwards;}
  .doc-ctx-item{
    padding:12px 16px;color:var(--text-main);cursor:pointer;
    opacity:0;display:flex;justify-content:space-between;white-space:nowrap;
    touch-action:manipulation;min-height:44px;
    transition:background 0.15s ease;
  }
  .doc-ctx-item.reveal{animation:ctx-typein 0.16s cubic-bezier(0.22,1,0.36,1) forwards;}
  .doc-ctx-item:hover{background:var(--bg-alt);}
  .doc-ctx-key{color:var(--muted);font-size:clamp(10px, 2vw, 11px);}

  /* ============================================================
     模块 13：工具 & 移动端适配
     ============================================================ */
  #width-warning{display:none !important;}
  #font-missing{
    position:fixed;right:6px;bottom:4px;
    font-size:clamp(8px, 1.6vw, 10px);
    color:var(--muted);z-index:5;display:none;letter-spacing:0.05em;
  }
  #font-missing.show{display:block;}
  #import-input{display:none;}

  .clickable-area{
    min-height:44px;min-width:44px;
    display:inline-flex;align-items:center;justify-content:center;
  }

  @media (max-width:480px){
    #date-bar{padding:8px 12px 4px 12px;}
    #timeline-wrap{padding:4px 12px 12px 12px;}
    .msg-row{gap:8px;margin-bottom:1.4em;}
    .msg-id{width:38px;font-size:10px;}
    .msg-body{font-size:14px;}
    #input-area{padding:8px 12px 12px 12px;}
    #echo-input{font-size:16px;padding:6px 0;}
    #copied-flag{right:12px;bottom:36px;font-size:10px;}
    #cmd-feedback{left:12px;bottom:36px;font-size:10px;}
    #friends-panel{width:100%;max-width:100%;}
    #doc-container{max-height:100%;height:100%;border-radius:0;border:none;}
    #doc-scroll{padding:40px 16px 50px 16px;}
    .ctx-item{padding:10px 12px;font-size:14px;min-height:40px;}
    .doc-ctx-item{padding:10px 12px;font-size:14px;min-height:40px;}
    .fp-row{padding:8px 14px;font-size:13px;min-height:40px;}
    #fp-header{padding:12px 14px;}
    #fp-add{padding:10px 14px;}
    .fp-section-title{padding:8px 14px;}
    #cmd-autocomplete{left:12px;width:calc(100% - 24px);font-size:12px;}
    .ac-item{padding:6px 10px;min-height:32px;}
    #stats-box,#cal-box{padding:20px 16px;}
  }
  @media (max-width:380px){
    #identity-label{font-size:9px;}
    #date-bar{font-size:9px;}
    .msg-id{width:32px;font-size:9px;}
    .msg-body{font-size:13px;}
    #echo-input{font-size:14px;}
  }
</style>
</head>
<body>

<!-- ============================================================
     模块 14：HTML 结构
     ============================================================ -->

<canvas id="bg-canvas"></canvas>

<div id="boot-screen">
  <span>按下任意键 唤醒时间线<span id="boot-cursor"></span></span>
</div>

<div id="auth-screen">
  <div id="auth-panel">
    <div id="auth-tabs">
      <div class="auth-tab active" data-mode="login">登录 / 锚定频率</div>
      <div class="auth-tab" data-mode="register">注册 / 刻录新频率</div>
    </div>
    <form id="auth-form" autocomplete="off">
      <div class="auth-field">
        <label class="auth-label">频率代号 CALLSIGN</label>
        <input class="auth-input" id="auth-callsign" type="text" maxlength="16" autocomplete="off">
      </div>
      <div class="auth-field">
        <label class="auth-label">共振密钥 KEY</label>
        <input class="auth-input" id="auth-password" type="password" maxlength="64" autocomplete="off">
